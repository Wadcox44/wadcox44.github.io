<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEUXVIDEO.PI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-gold: #ffaa00; 
            --bg: #050b14; 
            --width-max: 500px; 
        }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* BARRE DE DON */
        .top-donation-bar {
            position: sticky; top: 0; width: 100%; z-index: 1000;
            background: rgba(10, 20, 35, 0.95); border-bottom: 1px solid var(--neon-blue);
            backdrop-filter: blur(8px); display: flex; justify-content: center;
            align-items: center; padding: 10px 0; gap: 15px;
        }
        .btn-don-min { 
            background: transparent; border: 1px solid var(--neon-blue); color: white;
            font-family: 'Orbitron'; font-size: 0.65rem; padding: 5px 15px; cursor: pointer; transition: 0.3s;
        }
        .btn-don-min:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 10px var(--neon-blue); }

        /* HEADER AVEC LOGO FIDÈLE */
        header { padding: 25px 0 10px 0; width: 100%; display: flex; justify-content: center; }
        .header-content { display: flex; align-items: center; gap: 15px; }
        
        /* Style du logo SVG pour correspondre à l'image */
        .svg-logo {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.7));
        }

        h1 { 
            font-family: 'Orbitron'; font-size: 1.8rem; margin: 0; 
            text-shadow: 0 0 15px var(--neon-blue); line-height: 1;
        }
        .pi-text { color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold); }

        section { width: 90%; max-width: var(--width-max); padding: 15px 0; border-bottom: 1px solid rgba(0, 243, 255, 0.1); }
        .category-title { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon-blue); border-left: 3px solid var(--neon-gold); padding-left: 10px; margin-bottom: 15px; text-transform: uppercase; }

        /* MAIN PROJECT */
        .hero-card {
            width: 100%; height: 230px; background: #000; border: 2px solid rgba(255, 170, 0, 0.4); 
            border-radius: 12px; overflow: hidden; cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center; transition: 0.5s;
        }
        .hero-card img { width: 101%; height: 101%; object-fit: cover; filter: brightness(0.6); transition: 0.8s ease; }
        .hero-overlay-text { position: absolute; font-family: 'Orbitron'; font-size: 2.2rem; color: var(--neon-gold); letter-spacing: 5px; font-weight: 900; transition: 0.5s ease; text-align: center; pointer-events: none; }

        /* GRILLE DE JEUX */
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; margin-bottom: 20px; }
        .card { background: rgba(16, 33, 62, 0.4); border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 10px; height: 130px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s; }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .card h3 { position: absolute; bottom: 8px; margin: 0; font-size: 0.55rem; font-family: 'Orbitron'; color: var(--neon-blue); }

        footer { font-size: 0.7rem; color: #444; padding: 40px 0; text-align: center; }
    </style>
</head>
<body>

    <div class="top-donation-bar">
        <span class="bar-label" style="font-family:'Orbitron'; font-size:0.6rem; color:var(--neon-blue);">Support:</span>
        <button class="btn-don-min">1 Pi</button>
        <button class="btn-don-min">10 Pi</button>
    </div>

    <header>
        <div class="header-content">
            <svg class="svg-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M40 25 L25 35 V65 L40 75 L45 70 V35 L40 25 Z" fill="#00f3ff" />
                <path d="M40 25 L45 35 V70 L40 75" stroke="#00f3ff" stroke-width="1" />
                <path d="M60 25 L75 35 V65 L60 75 L55 70 V35 L60 25 Z" fill="#00f3ff" />
                <path d="M50 38 L62 45 V55 L50 62 L38 55 V45 L50 38 Z" fill="#ffaa00" />
                <path d="M45 40 H55 M45 60 H55" stroke="#00f3ff" stroke-width="2" opacity="0.6"/>
            </svg>
            
            <h1>JEUXVIDEO<span class="pi-text">.PI</span></h1>
        </div>
    </header>

    <section>
        <div class="category-title">⭐ Main Project</div>
        <div class="hero-card" onclick="window.location.href='/gold-pixel/'">
            <img src="Images/Gold Pixel.png" alt="Gold Pixel">
            <div class="hero-overlay-text">GOLD PIXEL</div>
        </div>
    </section>

    <section>
        <div class="category-title">🚀 Developer Showcase</div>
        <div class="game-grid">
            <div class="card" onclick="window.location.href='2048/index.html'">
                <img src="Images/miniature 2048.jpg" alt="2048 Neon">
                <h3>2048 NEON</h3>
            </div>
            <div class="card" style="border: 1px dashed rgba(255,170,0,0.5);">
                <span style="color:var(--neon-gold); font-size:1.5rem;">✚</span>
                <h3 style="position:relative; bottom:0; font-size:0.5rem;">Deploy Here</h3>
            </div>
            <div class="card" style="border: 1px dashed rgba(255,170,0,0.5);">
                <span style="color:var(--neon-gold); font-size:1.5rem;">✚</span>
                <h3 style="position:relative; bottom:0; font-size:0.5rem;">Deploy Here</h3>
            </div>
        </div>
    </section>

    <footer>✔ Certified WadCox | Pi Network Ecosystem</footer>

</body>
</html>
