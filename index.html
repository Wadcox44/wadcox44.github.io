<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEUXVIDEO.PI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-gold: #ffaa00; 
            --bg: #050b14; 
            --width-max: 500px; 
        }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* HEADER RÉDUIT */
        header { padding: 15px 0 5px 0; text-align: center; width: 100%; }
        h1 { font-family: 'Orbitron'; font-size: 1.8rem; margin: 0; text-shadow: 0 0 10px var(--neon-blue); }
        .pi-text { color: var(--neon-gold); text-shadow: 0 0 8px var(--neon-gold); }

        section {
            width: 90%; max-width: var(--width-max); padding: 15px 0; /* Espacement réduit */
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
        }

        .category-title {
            font-family: 'Orbitron'; font-size: 0.75rem;
            color: var(--neon-blue); border-left: 3px solid var(--neon-gold);
            padding-left: 10px; margin-bottom: 10px; text-transform: uppercase;
        }

        /* MAIN PROJECT */
        .hero-card {
            width: 100%; height: 200px; /* Hauteur légèrement réduite */
            background: #000; border: 2px solid rgba(255, 170, 0, 0.3); border-radius: 12px;
            overflow: hidden; cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: 0.5s;
        }
        .hero-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); transition: 0.8s; }
        .hero-overlay-text { position: absolute; font-family: 'Orbitron'; font-size: 2rem; color: var(--neon-gold); letter-spacing: 5px; transition: 0.5s; pointer-events: none; }
        .hero-card:hover { border-color: var(--neon-gold); box-shadow: 0 0 30px rgba(255, 170, 0, 0.4); }
        .hero-card:hover .hero-overlay-text { letter-spacing: 10px; text-shadow: 0 0 20px var(--neon-gold); }

        /* DEVELOPER OFFER (SCANNING) */
        @keyframes scan { 0% { left: -100%; } 30% { left: 100%; } 100% { left: 100%; } }
        .offer-container {
            width: 100%; background: rgba(0, 243, 255, 0.03);
            border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 10px;
            padding: 15px 0; text-align: center; position: relative; overflow: hidden; margin-top: 10px;
        }
        .offer-container::before { content: ""; position: absolute; top: 0; width: 100%; height: 100%; background: linear-gradient(120deg, transparent, rgba(0, 243, 255, 0.1), transparent); animation: scan 4s infinite linear; }
        .offer-main-title { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; }
        .offer-grid { display: flex; justify-content: space-around; position: relative; }
        .offer-point strong { display: block; font-size: 0.65rem; font-family: 'Orbitron'; }
        .offer-point span { font-size: 0.5rem; color: rgba(255,255,255,0.5); }

        /* NOUVEAU SYSTÈME DE DON FLOTTANT (SIDEBAR) */
        .donation-sidebar {
            position: fixed; right: -130px; top: 50%; transform: translateY(-50%);
            background: rgba(15, 26, 46, 0.95); border: 1px solid var(--neon-blue);
            border-radius: 10px 0 0 10px; padding: 15px 10px;
            display: flex; flex-direction: column; gap: 10px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100;
            box-shadow: -5px 0 20px rgba(0, 243, 255, 0.2);
        }
        .donation-sidebar:hover { right: 0; }
        .donation-handle {
            position: absolute; left: -40px; top: 0; bottom: 0; width: 40px;
            background: var(--neon-blue); color: #000; border-radius: 10px 0 0 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; font-size: 0.8rem; writing-mode: vertical-rl;
            text-transform: uppercase; font-family: 'Orbitron';
        }
        .btn-don-small {
            background: transparent; border: 1px solid var(--neon-blue);
            color: white; padding: 8px; font-family: 'Orbitron'; font-size: 0.7rem;
            cursor: pointer; border-radius: 5px; transition: 0.3s;
        }
        .btn-don-small:hover { background: var(--neon-blue); color: black; }

        /* FOOTER / CONTACT */
        .btn-send { background: var(--neon-blue); border: none; padding: 12px; font-weight: bold; border-radius: 4px; font-family: 'Orbitron'; cursor: pointer; width: 100%; margin-top: 10px; }
        footer { font-size: 0.6rem; color: #444; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="donation-sidebar">
        <div class="donation-handle">Support Us</div>
        <button class="btn-don-small">1 Pi</button>
        <button class="btn-don-small">10 Pi</button>
        <button class="btn-don-small">Custom</button>
    </div>

    <header>
        <h1>JEUXVIDEO<span class="pi-text">.PI</span></h1>
    </header>

    <section>
        <div class="category-title">⭐ Main Project</div>
        <div class="hero-card" onclick="window.location.href='https://goldpixel.netlify.app/'">
            <img src="Images/Gold Pixel.png" alt="Gold Pixel">
            <div class="hero-overlay-text">GOLD PIXEL</div>
        </div>
    </section>

    <section style="border:none;">
        <div class="category-title">🚀 Developer Showcase</div>
        <div class="offer-container">
            <div class="offer-main-title">DEVELOPER OFFER : NO CHARGE *</div>
            <div class="offer-grid">
                <div class="offer-point"><strong>Premium Slot</strong><span>Priority Access</span></div>
                <div class="offer-point" style="border-left: 1px solid rgba(0, 243, 255, 0.1); border-right: 1px solid rgba(0, 243, 255, 0.1);">
                    <strong>0 Pi Rent</strong><span>No Monthly Cost</span>
                </div>
                <div class="offer-point"><strong>0% Fee</strong><span>On Transactions</span></div>
            </div>
        </div>
        
        <form action="https://formspree.io/f/xwvoaroz" method="POST" style="margin-top: 15px;">
            <button type="submit" class="btn-send">SUBMIT MY GAME</button>
        </form>
    </section>

    <footer>✔ Certified WadCox | Pi Network Ecosystem</footer>

</body>
</html>
