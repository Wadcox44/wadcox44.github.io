<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEUXVIDEO.PI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --neon-blue: #00f3ff; --neon-orange: #ffaa00; --bg: #050b14; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Animations */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px var(--neon-blue), 0 0 30px var(--neon-blue);
            }
            20%, 22%, 55% { text-shadow: none; }
        }

        header { padding: 25px 5px 10px; text-align: center; width: 100%; }
        h1 { font-family: 'Orbitron'; font-size: 2.2rem; margin: 0; animation: flicker 3s infinite alternate; letter-spacing: 2px; }
        .pi-text { color: var(--neon-orange); text-shadow: 0 0 10px var(--neon-orange); }

        /* Catégories */
        .category-title {
            width: 90%; max-width: 500px; font-family: 'Orbitron'; font-size: 0.85rem;
            color: var(--neon-blue); border-left: 3px solid var(--neon-orange);
            padding-left: 10px; margin: 25px 0 15px 0; text-transform: uppercase;
        }

        /* Projet Principal avec Gold & Pixel */
        .hero-container {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; width: 95%; max-width: 550px; margin-bottom: 20px;
        }
        .side-text {
            font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon-orange);
            text-shadow: 0 0 10px var(--neon-orange); letter-spacing: 2px;
        }

        /* Cartes */
        .card {
            background: rgba(16, 33, 62, 0.8); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 8px; padding: 12px 5px; text-align: center; cursor: pointer;
            transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { border-color: var(--neon-blue); transform: translateY(-3px); box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); }
        
        .card-thumb {
            width: 90%; height: 80px; object-fit: contain; background: rgba(0, 0, 0, 0.3);
            border-radius: 4px; margin-bottom: 8px; transition: 0.4s;
        }
        
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95%; max-width: 500px; }
        .card h3 { margin: 0; font-size: 0.65rem; color: var(--neon-blue); text-transform: uppercase; }
        .empty { border: 1px dashed #444; opacity: 0.5; cursor: default; }
        .card-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }

        /* Section Dons */
        .donation-section { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .donation-title { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 0.9rem; margin-bottom: 15px; text-align: center; }
        
        .goal-container { width: 90%; max-width: 450px; margin-bottom: 15px; }
        .progress-bg { background: rgba(255,255,255,0.1); height: 10px; border-radius: 10px; border: 1px solid rgba(0, 243, 255, 0.2); overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, var(--neon-blue), #00ff88); width: 45%; height: 100%; box-shadow: 0 0 10px var(--neon-blue); }

        .donation-grid { display: flex; gap: 10px; width: 90%; max-width: 450px; }
        .btn-quick-don { 
            flex: 1; background: #0f1a2e; border: 1px solid var(--neon-blue); color: #fff; 
            padding: 12px; border-radius: 4px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.8rem;
        }

        /* Offre de lancement (Style original) */
        .partner-callout {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 20px; margin: 15px auto; text-align: center; width: 90%; max-width: 500px;
        }
        .launch-badge {
            display: inline-block; border: 1px solid #ffd700; color: #ffd700;
            padding: 8px 20px; border-radius: 50px; font-size: 14px; letter-spacing: 2px;
            margin-bottom: 12px; font-weight: bold; background: rgba(255, 215, 0, 0.05); text-transform: uppercase;
        }
        .offer-grid { display: flex; justify-content: space-around; margin-top: 15px; gap: 10px; }
        .offer-item { background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 10px; flex: 1; }
        .offer-item strong { display: block; font-size: 0.9rem; color: #fff; }
        .offer-item p { font-size: 0.65rem; color: rgba(255,255,255,0.6); margin: 0; }

        /* Formulaire & Modal */
        .contact-area { width: 100%; padding: 30px 0; background: rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; }
        input, textarea { background: #0f1a2e; border: 1px solid #333; color: white; padding: 12px; border-radius: 4px; font-family: 'Rajdhani'; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn-send { width: 100%; background: var(--neon-blue); border: none; padding: 14px; font-weight: bold; border-radius: 4px; font-family: 'Orbitron'; cursor: pointer; }

        #thankYouModal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(5, 11, 20, 0.95); align-items: center; justify-content: center;
        }
        .modal-content { background: #0f1a2e; border: 2px solid var(--neon-orange); padding: 30px; border-radius: 15px; text-align: center; max-width: 280px; }

        footer { font-size: 0.7rem; color: #666; padding: 30px; text-align: center; }
    </style>
</head>
