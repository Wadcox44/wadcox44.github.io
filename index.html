<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>JeuxVideo.Pi | Main Portal</title> <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet"> <style>
        /* --- THEME CYBER PORTAL --- */
        :root {
            --cyan: #00f2ff; /* Bleu néon des bordures */
            --gold: #ff9900; /* Or du logo et Gold Pixel */
            --bg: #050a0f; /* Fond très sombre */
            --card-bg: rgba(10, 20, 30, 0.8); /* Fond des cartes */
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Roboto', sans-serif; text-align: center;
        }

        header { padding: 40px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: white; }
        .logo span { color: var(--gold); }

        .section-title {
            color: var(--cyan); font-family: 'Orbitron', sans-serif;
            text-align: left; max-width: 900px; margin: 30px auto 15px;
            font-size: 0.9rem; letter-spacing: 2px; border-left: 3px solid var(--gold); padding-left: 10px;
        }

        /* --- MAIN PROJECT BLOCK --- */
        .main-project {
            max-width: 900px; margin: 0 auto;
            border: 1px solid var(--gold); border-radius: 10px;
            overflow: hidden; position: relative;
            background: url('https://ton-image-fond.jpg') center/cover; /* Ton image avec le globe */
            height: 400px; display: flex; align-items: center; justify-content: center;
        }
        .main-project h2 { font-family: 'Orbitron', sans-serif; font-size: 3rem; color: var(--gold); letter-spacing: 5px; }

        /* --- DEVELOPER SHOWCASE --- */
        .showcase-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            max-width: 900px; margin: 0 auto; gap: 20px;
        }
        .slot {
            border: 1px solid var(--cyan); border-radius: 8px;
            background: var(--card-bg); height: 180px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s; cursor: pointer;
        }
        .slot:hover { box-shadow: 0 0 15px var(--cyan); }
        .plus-icon { font-size: 2rem; color: var(--gold); }
        .slot-text { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--cyan); margin-top: 10px; }

        /* --- FORMULAIRE DE CONTACT --- */
        .contact-form {
            max-width: 500px; margin: 60px auto; padding: 30px;
            border-top: 1px solid #222;
        }
        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #111; border: 1px solid var(--cyan);
            color: white; border-radius: 5px;
        }
        .btn-submit {
            background: var(--gold); color: black; border: none;
            padding: 12px 30px; font-family: 'Orbitron', sans-serif;
            font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">⚡ JEUXVIDEO.<span>PI</span></div> </header>

<div class="section-title">⭐ MAIN PROJECT</div>
<div class="main-project" onclick="location.href='https://gold-pixel.onrender.com'">
    <h2>GOLD PIXEL</h2> </div>

<div class="section-title">🚀 DEVELOPER SHOWCASE</div>
<div class="showcase-grid">
    <div class="slot"> <img src="https://via.placeholder.com/60" alt="2048">
        <div class="slot-text">2048 NEON</div>
    </div>
    <div class="slot"> <span class="plus-icon">+</span>
        <div class="slot-text">DEPLOY HERE</div>
    </div>
    <div class="slot"> <span class="plus-icon">+</span>
        <div class="slot-text">DEPLOY HERE</div>
    </div>
</div>

<div class="contact-form">
    <h3 style="font-family:'Orbitron'; color:var(--gold);">LOUER UN EMPLACEMENT</h3>
    <p style="font-size: 0.8rem; opacity: 0.7;">Développeurs, intégrez notre portail et profitez de l'audience Pi.</p>
    <form>
        <input type="text" placeholder="Nom du Projet / Studio" required> <input type="email" placeholder="Email de contact" required> <textarea placeholder="Décrivez votre jeu en quelques mots..." rows="4"></textarea> <button type="submit" class="btn-submit">ENVOYER LA DEMANDE</button> </form>
</div>

<footer style="padding: 20px; opacity: 0.4; font-size: 0.7rem;">
    ✓ Certified WadCox | Pi Network Ecosystem
</footer>

</body>
</html>
