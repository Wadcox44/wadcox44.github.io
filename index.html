<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEUXVIDEO.PI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        /* --- STYLE DE TON EMPIRE --- */
        :root { --neon-blue: #00f3ff; --neon-orange: #ffaa00; --bg: #050b14; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px var(--neon-blue), 0 0 30px var(--neon-blue);
            }
            20%, 22%, 55% { text-shadow: none; }
        }

        header { padding: 25px 5px 10px; text-align: center; width: 100%; }
        h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin: 0; 
            color: #fff; text-transform: uppercase; animation: flicker 3s infinite alternate;
            letter-spacing: 2px;
        }
        .pi-text { color: var(--neon-orange); animation: none; text-shadow: 0 0 10px var(--neon-orange); }

        /* --- SECTION GOLD PIXEL (LE JEU) --- */
        .main-container { width: 95%; max-width: 500px; margin-top: 10px; }
        .section-label { 
            font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon-blue); 
            margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
            text-transform: uppercase;
        }

        .gold-pixel-hero {
            width: 100%; height: 220px; border: 2px solid var(--neon-orange);
            border-radius: 15px; position: relative; overflow: hidden;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.3); transition: 0.4s;
            background: #000;
        }
        .gold-pixel-hero:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(255, 170, 0, 0.5); }
        
        /* L'image de fond depuis ton GitHub */
        .gold-pixel-hero img { 
            width: 100%; height: 100%; object-fit: cover; 
            opacity: 0.6; filter: brightness(0.8);
        }

        .gold-pixel-title {
            position: absolute; font-family: 'Orbitron'; font-size: 2.5rem;
            color: var(--neon-orange); font-weight: 900; letter-spacing: 5px;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8), 0 0 10px var(--neon-orange);
            text-align: center; width: 100%;
        }

        /* --- GRILLE DES AUTRES JEUX --- */
        .game-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 8px; width: 100%; margin-top: 15px;
        }
        .card {
            background: rgba(16, 33, 62, 0.8); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 8px; padding: 12px 5px; text-align: center; cursor: pointer;
        }
        .card-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
        .card h3 { margin: 0; font-size: 0.6rem; color: var(--neon-blue); text-transform: uppercase; }
        .empty { border: 1px dashed #444; opacity: 0.5; cursor: default; }

        /* --- BOUTON DON --- */
        .btn-don {
            background: #0f1a2e; color: var(--neon-blue); padding: 16px; font-weight: 800; 
            border-radius: 4px; font-family: 'Orbitron'; cursor: pointer; border: 1px solid var(--neon-blue);
            width: 100%; text-transform: uppercase; margin-top: 20px; transition: 0.3s;
        }
        .btn-don:hover { background: var(--neon-blue); color: black; }

        /* --- FORMULAIRE FORMSPREE --- */
        .contact-area { width: 100%; padding: 30px 0; background: rgba(0,0,0,0.3); margin-top: 30px; display: flex; flex-direction: column; align-items: center; }
        .form-container { width: 90%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        input, textarea { background: #0f1a2e; border: 1px solid #333; color: white; padding: 12px; border-radius: 4px; font-family: 'Rajdhani'; width: 100%; box-sizing: border-box; }
        .btn-send { background: var(--neon-blue); border: none; padding: 14px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; width: 100%; }

        footer { font-size: 0.7rem; color: #444; padding: 30px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>JEUXVIDEO<span class="pi-text">.PI</span></h1>
    </header>

    <div class="main-container">
        <div class="section-label">⭐ Main Project</div>
        
        <div class="gold-pixel-hero" onclick="window.location.href='https://gold-pixel.onrender.com'">
            <img src="Images/Gold Pixel.png" alt="Gold Pixel Image">
            <div class="gold-pixel-title">GOLD PIXEL</div>
        </div>

        <div class="section-label" style="margin-top:25px;">🚀 Showcase</div>
        <div class="game-grid">
            <div class="card" onclick="window.location.href='2048/index.html'">
                <span class="card-icon">🧩</span>
                <h3>2048 NEON</h3>
            </div>
            <div class="card empty">
                <span class="card-icon">🎮</span>
                <h3>SLOT DEV</h3>
            </div>
            <div class="card empty">
                <span class="card-icon">📦</span>
                <h3>VOTRE JEU</h3>
            </div>
        </div>

        <button id="pay_button" class="btn-don">SOUTENEZ LE PROJET (DON)</button>
    </div>

    <div class="contact-area">
        <div style="font-family:'Orbitron'; color:var(--neon-blue); margin-bottom:15px;">PARTENARIATS</div>
        <form action="https://formspree.io/f/xwvoaroz" method="POST" class="form-container">
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" rows="3" placeholder="Votre message..." required></textarea>
            <button type="submit" class="btn-send">ENVOYER</button>
        </form>
    </div>

    <footer>✔ Certifié WadCox | Écosystème Pi Network</footer>

    <script>
        // --- LOGIQUE SDK PI (Gardée intacte) ---
        async function initPi() {
            try {
                await Pi.init({ version: "2.0", sandbox: false });
                console.log("SDK Initialisé");
            } catch (e) { console.warn("SDK non chargé"); }
        }
        initPi();

        // Ajoute ici tes fonctions donnerPi() et clorePaiementsBloqués() comme avant
    </script>
</body>
</html>
