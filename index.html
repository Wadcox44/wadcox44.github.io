<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEUXVIDEO.PI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-gold: #ffaa00; 
            --bg: #050b14; 
            --width-max: 500px; 
        }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 1. BARRE DE DON FIXE (Haut de page, n'empiète pas sur le flux) */
        .top-donation-bar {
            position: sticky; top: 0; width: 100%; z-index: 1000;
            background: rgba(10, 20, 35, 0.9); border-bottom: 1px solid var(--neon-blue);
            backdrop-filter: blur(5px); display: flex; justify-content: center;
            align-items: center; padding: 8px 0; gap: 15px;
        }
        .bar-label { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--neon-blue); text-transform: uppercase; }
        .btn-don-min { 
            background: transparent; border: 1px solid var(--neon-blue); color: white;
            font-family: 'Orbitron'; font-size: 0.65rem; padding: 4px 12px; cursor: pointer; transition: 0.3s;
        }
        .btn-don-min:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 10px var(--neon-blue); }

        /* 2. HEADER ULTRA COMPACT */
        header { padding: 10px 0 0 0; text-align: center; width: 100%; }
        h1 { font-family: 'Orbitron'; font-size: 1.6rem; margin: 0; text-shadow: 0 0 10px var(--neon-blue); }
        .pi-text { color: var(--neon-gold); text-shadow: 0 0 8px var(--neon-gold); }

        section {
            width: 90%; max-width: var(--width-max); padding: 10px 0;
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
        }

        .category-title {
            font-family: 'Orbitron'; font-size: 0.75rem; color: var(--neon-blue);
            border-left: 3px solid var(--neon-gold); padding-left: 10px;
            margin-bottom: 12px; text-transform: uppercase;
        }

        /* CARTES ET ANIMATIONS RÉTABLIES */
        .hero-card {
            width: 100%; height: 200px; background: #000; border: 2px solid rgba(255, 170, 0, 0.3);
            border-radius: 12px; overflow: hidden; cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center; transition: 0.5s;
        }
        .hero-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); transition: 0.8s; }
        .hero-overlay-text { position: absolute; font-family: 'Orbitron'; font-size: 1.8rem; color: var(--neon-gold); letter-spacing: 5px; transition: 0.5s; pointer-events: none; }
        .hero-card:hover { border-color: var(--neon-gold); box-shadow: 0 0 25px rgba(255, 170, 0, 0.4); }
        .hero-card:hover img { transform: scale(1.1); filter: brightness(0.8); }

        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 15px; }
        .card {
            background: rgba(16, 33, 62, 0.4); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 8px; height: 110px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s;
        }
        .card:hover { border-color: var(--neon-blue); transform: translateY(-3px); box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }
        .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .card h3 { position: absolute; bottom: 5px; margin: 0; font-size: 0.5rem; font-family: 'Orbitron'; color: var(--neon-blue); }

        /* OFFER BLOCK AVEC EFFET SCANNING */
        @keyframes scan { 0% { left: -100%; } 30% { left: 100%; } 100% { left: 100%; } }
        .offer-container {
            width: 100%; background: rgba(0, 243, 255, 0.03);
            border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 10px;
            padding: 15px 0; text-align: center; position: relative; overflow: hidden;
        }
        .offer-container::before { content: ""; position: absolute; top: 0; width: 100%; height: 100%; background: linear-gradient(120deg, transparent, rgba(0, 243, 255, 0.1), transparent); animation: scan 4s infinite linear; }
        .offer-main-title { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 0.85rem; margin-bottom: 10px; }
        .offer-grid { display: flex; justify-content: space-around; position: relative; }
        .offer-point strong { display: block; font-size: 0.65rem; font-family: 'Orbitron'; }
        .offer-point span { font-size: 0.5rem; color: rgba(255,255,255,0.4); }

        /* BOUTON SUBMIT */
        .btn-send { background: var(--neon-blue); border: none; padding: 14px; font-weight: bold; border-radius: 4px; font-family: 'Orbitron'; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; }
        .btn-send:hover { box-shadow: 0 0 20px var(--neon-blue); }

        footer { font-size: 0.6rem; color: #444; padding: 30px; text-align: center; }
    </style>
</head>
<body>

    <div class="top-donation-bar">
        <span class="bar-label">Support the Project:</span>
        <button class="btn-don-min">1 Pi</button>
        <button class="btn-don-min">10 Pi</button>
        <button class="btn-don-min">Custom</button>
    </div>

    <header>
        <h1>JEUXVIDEO<span class="pi-text">.PI</span></h1>
    </header>

    <section>
        <div class="category-title">⭐ Main Project</div>
        <div class="hero-card" onclick="window.location.href='https://goldpixel.netlify.app/'">
            <img src="Images/Gold Pixel.png" alt="Gold Pixel">
            <div class="hero-overlay-text">GOLD PIXEL</div>
        </div>
    </section>

    <section>
        <div class="category-title">🚀 Developer Showcase</div>
        <div class="game-grid">
            <div class="card" onclick="window.location.href='2048/index.html'">
                <img src="Images/miniature 2048.jpg" alt="2048">
                <h3>2048 NEON</h3>
            </div>
            <div class="card" style="border: 1px dashed rgba(0,243,255,0.3)">
                <div style="font-size: 1.2rem; opacity: 0.3;">✚</div>
                <h3>DEPLOY HERE</h3>
            </div>
            <div class="card" style="border: 1px dashed rgba(0,243,255,0.3)">
                <div style="font-size: 1.2rem; opacity: 0.3;">✚</div>
                <h3>DEPLOY HERE</h3>
            </div>
        </div>

        <div class="offer-container">
            <div class="offer-main-title">DEVELOPER OFFER : NO CHARGE *</div>
            <div class="offer-grid">
                <div class="offer-point"><strong>Premium Slot</strong><span>Priority Access</span></div>
                <div class="offer-point" style="border-left: 1px solid rgba(0,243,255,0.1); border-right: 1px solid rgba(0,243,255,0.1);">
                    <strong>0 Pi Rent</strong><span>No Monthly Cost</span>
                </div>
                <div class="offer-point"><strong>0% Fee</strong><span>On Transactions</span></div>
            </div>
        </div>

        <button type="button" class="btn-send">SUBMIT MY GAME</button>
    </section>

    <footer>✔ Certified WadCox | Pi Network Ecosystem</footer>

</body>
</html>
