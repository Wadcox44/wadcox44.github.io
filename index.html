        :root {
            --gold: #D4AF37; /* Couleur Or officielle */
            --bg: #0b0f14; /* Fond Matte Black */
            --panel: #121926; /* Couleur des cartes et menus */
            --stroke: #223047; /* Bordures techniques */
        }
        body {
            margin: 0; padding: 0; background: var(--bg); color: white;
            font-family: 'Rajdhani', sans-serif; display: flex; height: 100vh;
        }
        /* BARRE LATÉRALE (SIDEBAR) */
        .sidebar {
            width: 280px; background: var(--panel); border-right: 1px solid var(--stroke);
            display: flex; flex-direction: column; padding: 25px;
        }
        .profile-box {
            border: 1px solid var(--gold); padding: 15px; border-radius: 10px;
            background: rgba(212, 175, 55, 0.05); text-align: center;
        }
        .grade { color: var(--gold); font-family: 'Orbitron'; font-size: 12px; }
        
        /* ZONE PRINCIPALE */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        header { margin-bottom: 40px; }
        h1 { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--gold); margin: 0; }
        
        /* GRILLE DE LOCATION DES JEUX */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        
        /* TUILE DE JEU */
        .game-card {
            background: var(--panel); border: 1px solid var(--stroke); border-radius: 15px;
            padding: 20px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .game-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .game-card.featured { border: 2px solid var(--gold); background: linear-gradient(145deg, rgba(212,175,55,0.1), transparent); }
