<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>JeuxVideo.Pi - Le Portail</title>
    <style>
        /* Style casual et passionné pour ton empire */
        body { background-color: #1a1a1a; color: #ffd700; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        /* La zone du jeu Gold Pixel */
        .main-game { 
            border: 3px solid #ffd700; 
            padding: 40px; 
            margin: 20px 0; 
            cursor: pointer; 
            background: linear-gradient(45deg, #000, #333);
            border-radius: 15px;
            transition: transform 0.3s;
        }
        .main-game:hover { transform: scale(1.05); }
        .btn-enter { background-color: #ffd700; color: #000; padding: 15px 30px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        .submit-btn { background-color: #ffd700; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenue sur JeuxVideo.Pi</h1>
        <p>Le hub de l'innovation et du gaming sur Pi Network !</p>

        <div class="main-game" onclick="window.location.href='https://gold-pixel.onrender.com'">
            <h2>PROJET PHARE : GOLD PIXEL</h2>
            <p>Le jeu de conquête de pixels mensuel.</p>
            <button class="btn-enter">ENTRER DANS LE JEU</button>
        </div>

        <hr>

        <div id="contact">
            <h3>Louer un emplacement "Deploy Here"</h3>
            <p>Tu es développeur ? Contacte-moi pour intégrer ton jeu au portail !</p>
            <form action="https://formspree.io/f/votre_id_ici" method="POST">
                <input type="email" name="email" placeholder="Ton e-mail" required>
                <textarea name="message" placeholder="Parle-moi de ton projet..."></textarea>
                <button type="submit" class="submit-btn">Envoyer ma demande</button>
            </form>
        </div>
    </div>
</body>
</html>
