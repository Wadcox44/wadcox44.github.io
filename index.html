<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JeuxVideo.Pi - Hub Gaming</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #ffaa00; margin-bottom: 10px; }
        p { font-size: 0.9em; color: #a2a2d0; line-height: 1.5; }
        #pay_button { 
            background: linear-gradient(45deg, #ffaa00, #ff8800); 
            color: #000; padding: 18px; border: none; border-radius: 12px; 
            font-weight: 800; cursor: pointer; width: 100%; font-size: 1em; 
            text-transform: uppercase; margin-top: 20px; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 170, 0, 0.3);
        }
        #pay_button:disabled { background: #555; color: #888; cursor: not-allowed; }
        .footer { margin-top: 30px; font-size: 0.7em; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 JeuxVideo.Pi</h1>
        <p>Aidez-nous à construire le premier hub de jeux indépendant sur Pi Network. Votre contribution permet d'héberger les serveurs et d'ajouter de nouveaux titres chaque mois.</p>
        
        <button id="pay_button">🚀 DEVENIR MEMBRE FONDATEUR (1 PI)</button>
        
        <div class="footer">Étape 10 : Validation Mainnet en cours...</div>
    </div>

    <script>
  Pi.init({ version: "2.0", sandbox: false });

  // Cette fonction va tenter de fermer TOUS les paiements qui traînent
  async function clorePaiementsBloqués(payment) {
    console.log("Nettoyage du paiement :", payment.identifier);
    try {
      // 1. On informe ton serveur
      await fetch('https://wadcox44-github-io.vercel.app/api/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentId: payment.identifier })
      });
      // 2. On dit au SDK que c'est fini
      await Pi.completePayment(payment.identifier);
      console.log("Paiement clos avec succès");
    } catch (e) {
      console.error("Erreur nettoyage :", e);
    }
  }

  async function donnerPi() {
    const btn = document.getElementById('pay_button');
    try {
      // Authentification avec fonction de nettoyage automatique
      await Pi.authenticate(['username', 'payments'], clorePaiementsBloqués);

      await Pi.createPayment({
        amount: 1,
        memo: "Finalisation Etape 10",
        metadata: { productId: "fondateur-001" }
      }, {
        onReadyForServerApproval: function(paymentId) {
          btn.disabled = true;
          return fetch('https://wadcox44-github-io.vercel.app/api/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paymentId: paymentId })
          }).then(res => res.json());
        },
        onReadyForServerCompletion: function(paymentId, txid) {
          // IMPORTANT : On finalise officiellement ici aussi
          Pi.completePayment(paymentId);
          alert("Transaction validée !");
          window.location.href = "2048/index.html";
        },
        onCancel: function(paymentId) { btn.disabled = false; },
        onError: function(error, payment) {
          // Si l'erreur est "Pending", on essaie de fermer ce paiement
          if(payment) { clorePaiementsBloqués(payment); }
          alert("Note : Le système se synchronise. Réessayez dans un instant.");
          btn.disabled = false;
        }
      });
    } catch (err) {
      alert("Erreur : " + err.message);
    }
  }

  document.getElementById('pay_button').onclick = donnerPi;
</script>
    
</body>
</html>
