<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEUXVIDEO.PI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --neon-blue: #00f3ff; --neon-orange: #ffaa00; --bg: #050b14; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Animations */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px var(--neon-blue), 0 0 30px var(--neon-blue);
            }
            20%, 22%, 55% { text-shadow: none; }
        }
        @keyframes neon-pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 243, 255, 0.2); border-color: rgba(0, 243, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 243, 255, 0.6); border-color: var(--neon-blue); }
        }

        header { padding: 25px 5px 10px; text-align: center; width: 100%; }
        h1 { font-family: 'Orbitron'; font-size: 2.5rem; margin: 0; animation: flicker 3s infinite alternate; letter-spacing: 2px; }
        .pi-text { color: var(--neon-orange); text-shadow: 0 0 10px var(--neon-orange); }

        /* Structure Sections */
        .category-title {
            width: 90%; max-width: 500px; font-family: 'Orbitron'; font-size: 0.85rem;
            color: var(--neon-blue); border-left: 3px solid var(--neon-orange);
            padding-left: 10px; margin: 25px 0 10px 0; text-transform: uppercase;
        }

        .game-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; padding: 10px; width: 95%; max-width: 500px;
        }

        /* Cartes & Miniatures */
        .card {
            background: rgba(16, 33, 62, 0.8); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 8px; padding: 12px 5px; text-align: center; cursor: pointer;
            transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { border-color: var(--neon-blue); transform: translateY(-3px); box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); }
        
        .card-thumb {
            width: 90%; height: 75px; object-fit: contain; background: rgba(0, 0, 0, 0.3);
            border-radius: 4px; margin-bottom: 8px; border: 1px solid transparent; transition: 0.4s;
        }
        .card:hover .card-thumb { border-color: var(--neon-blue); box-shadow: 0 0 12px var(--neon-blue); }

        .card h3 { margin: 0; font-size: 0.65rem; color: var(--neon-blue); text-transform: uppercase; }
        .empty { border: 1px dashed #444; opacity: 0.5; cursor: default; }
        .card-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }

        /* Système de Dons & Barre */
        .donation-section { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .goal-container { width: 90%; max-width: 450px; margin-bottom: 15px; }
        .goal-label { font-size: 0.7rem; color: var(--neon-blue); display: flex; justify-content: space-between; margin-bottom: 5px; }
        .progress-bg { background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; border: 1px solid rgba(0, 243, 255, 0.2); overflow: hidden; }
        .progress-bar { background: var(--neon-blue); width: 45%; height: 100%; box-shadow: 0 0 10px var(--neon-blue); }

        .donation-grid { display: flex; gap: 10px; width: 90%; max-width: 450px; }
        .btn-quick-don { 
            flex: 1; background: #0f1a2e; border: 1px solid var(--neon-blue); color: #fff; 
            padding: 10px; border-radius: 4px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.8rem;
        }
        .btn-quick-don:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        /* Modal de remerciement */
        #thankYouModal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(5, 11, 20, 0.95); align-items: center; justify-content: center;
        }
        .modal-content {
            background: #0f1a2e; border: 2px solid var(--neon-orange); padding: 30px; border-radius: 15px;
            text-align: center; max-width: 280px; box-shadow: 0 0 30px var(--neon-orange);
        }

        /* Partenaires & Contact */
        .partner-callout { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin: 10px auto; text-align: center; width: 90%; max-width: 500px; }
        .launch-badge { display: inline-block; border: 1px solid #ffd700; color: #ffd700; padding: 5px 15px; border-radius: 50px; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        
        .contact-area { width: 100%; padding: 30px 0; background: rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; }
        .form-container { width: 90%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        input, textarea { background: #0f1a2e; border: 1px solid #333; color: white; padding: 12px; border-radius: 4px; font-family: 'Rajdhani'; width: 100%; box-sizing: border-box; }
        .btn-send { width: 100%; background: var(--neon-blue); border: none; padding: 14px; font-weight: bold; border-radius: 4px; font-family: 'Orbitron'; cursor: pointer; }

        footer { font-size: 0.7rem; color: #666; padding: 30px; text-align: center; }
    </style>
</head>
