<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEUXVIDEO.PI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --neon-blue: #00f3ff; --neon-orange: #ffaa00; --bg: #050b14; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- ANIMATIONS --- */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px var(--neon-blue), 0 0 30px var(--neon-blue);
            }
            20%, 22%, 55% { text-shadow: none; }
        }

        @keyframes neon-pulse {
            0% { box-shadow: 0 0 5px rgba(0, 243, 255, 0.2); border-color: rgba(0, 243, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 243, 255, 0.6); border-color: var(--neon-blue); }
            100% { box-shadow: 0 0 5px rgba(0, 243, 255, 0.2); border-color: rgba(0, 243, 255, 0.2); }
        }

        @keyframes shine { 100% { left: 125%; } }

        header { padding: 25px 5px 10px; text-align: center; width: 100%; }
        h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin: 0; 
            color: #fff; text-transform: uppercase; animation: flicker 3s infinite alternate;
            letter-spacing: 2px;
        }
        .pi-text { color: var(--neon-orange); animation: none; text-shadow: 0 0 10px var(--neon-orange); }

        /* --- TITRES DE CATÉGORIES --- */
        .category-title {
            width: 90%; max-width: 500px;
            font-family: 'Orbitron'; font-size: 0.85rem;
            color: var(--neon-blue); border-left: 3px solid var(--neon-orange);
            padding-left: 10px; margin: 25px 0 10px 0;
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* --- SYSTÈME DE GRILLE ET CARTES --- */
        .game-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; padding: 10px; width: 95%; max-width: 500px; box-sizing: border-box;
        }

        .card {
            background: rgba(16, 33, 62, 0.8); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 8px; padding: 12px 5px; text-align: center; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.3s ease; overflow: hidden;
        }

        .card:hover {
            border-color: var(--neon-blue);
            transform: translateY(-3px);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        /* MINIATURES NÉON */
        .card-thumb {
            width: 90%; height: 75px;
            object-fit: contain; background: rgba(0, 0, 0, 0.3);
            border-radius: 4px; margin-bottom: 8px;
            border: 1px solid transparent; transition: all 0.4s ease;
        }

        .card:hover .card-thumb {
            border-color: var(--neon-blue);
            box-shadow: 0 0 12px var(--neon-blue); /* L'effet Néon */
            background: rgba(0, 0, 0, 0.1);
        }

        .card-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }
        .card h3 { margin: 0; font-size: 0.65rem; color: var(--neon-blue); text-transform: uppercase; }
        .empty { border: 1px dashed #444; opacity: 0.5; cursor: default; }

        /* --- SECTIONS SPÉCIFIQUES --- */
        .donation-section { text-align: center; padding: 30px 0; width: 100%; display: flex; justify-content: center; }
        .btn-don {
            background: #0f1a2e; color: var(--neon-blue); padding: 16px 25px; font-weight: 800; border-radius: 4px;
            font-family: 'Orbitron'; cursor: pointer; border: 1px solid var(--neon-blue);
            width: 90%; max-width: 450px; text-transform: uppercase; letter-spacing: 1px;
            animation: neon-pulse 2s infinite ease-in-out; transition: 0.3s;
        }

        .partner-callout {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 20px; margin: 10px auto; text-align: center; width: 90%; max-width: 800px;
        }
        .launch-badge {
            display: inline-block; border: 1px solid #ffd700; color: #ffd700;
            padding: 8px 20px; border-radius: 50px; font-size: 15px; letter-spacing: 3px;
            margin-bottom: 12px; font-weight: bold; background: rgba(255, 215, 0, 0.05);
            text-transform: uppercase;
        }

        .offer-grid { display: flex; justify-content: space-around; margin-top: 15px; gap: 10px; }

            background: rgba
