<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEUXVIDEO.PI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --neon-blue: #00f3ff; --neon-orange: #ffaa00; --bg: #050b14; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px var(--neon-blue), 0 0 30px var(--neon-blue);
            }
            20%, 22%, 55% { text-shadow: none; }
        }

        @keyframes neon-pulse {
            0% { box-shadow: 0 0 5px rgba(0, 243, 255, 0.2); border-color: rgba(0, 243, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 243, 255, 0.6); border-color: var(--neon-blue); }
            100% { box-shadow: 0 0 5px rgba(0, 243, 255, 0.2); border-color: rgba(0, 243, 255, 0.2); }
        }

        @keyframes glitch-hover {
            0% { transform: translate(0); text-shadow: -2px 0 #ff00c1, 2px 0 #00fff9; }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
            75% { transform: translate(-2px, -2px); }
            100% { transform: translate(0); }
        }

        header { padding: 25px 5px 10px; text-align: center; width: 100%; }
        h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin: 0; 
            color: #fff; text-transform: uppercase; animation: flicker 3s infinite alternate;
            letter-spacing: 2px;
        }
        .pi-text { color: var(--neon-orange); animation: none; text-shadow: 0 0 10px var(--neon-orange); }

        .game-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 8px; padding: 10px; width: 95%; max-width: 500px; box-sizing: border-box; margin-bottom: 15px;
        }
        .card {
            background: rgba(16, 33, 62, 0.8); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 8px; padding: 12px 5px; text-align: center; cursor: pointer;
        }
        .card-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }
        .card h3 { margin: 0; font-size: 0.65rem; color: var(--neon-blue); text-transform: uppercase; }
        .empty { border: 1px dashed #444; opacity: 0.5; cursor: default; }

        .donation-section { text-align: center; padding: 20px 0; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .btn-don {
            background: #0f1a2e; color: var(--neon-blue); padding: 16px 25px; font-weight: 800; border-radius: 4px;
            font-family: 'Orbitron'; cursor: pointer; border: 1px solid var(--neon-blue);
            width: 90%; max-width: 450px; text-transform: uppercase; letter-spacing: 1px;
            animation: neon-pulse 2s infinite ease-in-out; transition: 0.3s;
        }

        .partner-callout {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 20px; margin: 20px auto; text-align: center; width: 90%; max-width: 800px;
        }
        .launch-badge {
            display: inline-block; border: 1px solid #ffd700; color: #ffd700;
            padding: 8px 20px; border-radius: 50px; font-size: 15px; letter-spacing: 3px;
            margin-bottom: 12px; font-weight: bold; background: rgba(255, 215, 0, 0.05);
            text-transform: uppercase;
        }

        .offer-grid { display: flex; justify-content: space-around; margin-top: 15px; gap: 10px; }
        .offer-item { 
            background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 10px; flex: 1;
            display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 90px;
        }
        .offer-item strong { display: block; font-size: 1rem; margin-bottom: 4px; }
        .offer-item p { font-size: 0.7rem; color: rgba(255,255,255,0.6); margin: 0; }

        /* --- SECTION CONTACT PRO DARK --- */
        .contact-area { 
            width: 100%; padding: 60px 0; 
            background: linear-gradient(180deg, rgba(5,11,20,0) 0%, rgba(0,243,255,0.03) 100%); 
            display: flex; flex-direction: column; align-items: center; 
        }
        .contact-title { 
            font-family: 'Orbitron'; font-size: 1.1rem; margin-bottom: 30px; 
            color: white; letter-spacing: 3px; border-bottom: 2px solid var(--neon-blue); padding-bottom: 8px;
        }
        .form-container { 
            width: 90%; max-width: 500px; display: flex; flex-direction: column; gap: 25px; 
            background: rgba(10, 20, 30, 0.6); padding: 35px; border-radius: 4px;
        }
        .row { display: flex; gap: 15px; width: 100%; }
        input, textarea { 
            background: transparent !important; border: none !important;
            border-bottom: 1px solid rgba(255,255,255,0.2) !important;
            color: white !important; padding: 10px 5px !important; font-size: 1rem; 
            font-family: 'Rajdhani'; box-sizing: border-box; width: 100%; transition: 0.4s;
        }
        input:focus, textarea:focus { 
            border-bottom-color: var(--neon-blue) !important; outline: none; 
            background: rgba(0, 243, 255, 0.02) !important; 
        }
        .btn-send { 
            width: 100%; background: var(--neon-blue); border: none; padding: 18px; 
            font-weight: bold; color: #000; cursor: pointer; text-transform: uppercase; 
            font-family: 'Orbitron'; letter-spacing: 2px; transition: 0.3s; margin-top: 10px;
        }
        .btn-send:hover { 
            background: #fff; box-shadow: 0 0 20px var(--neon-blue); 
            animation: glitch-hover 0.2s infinite; 
        }

        footer { font-size: 0.75rem; color: #666; padding: 40px; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>JEUXVIDEO<span class="pi-text">.PI</span></h1>
    </header>

    <div class="game-grid">
        <div class="card" onclick="window.location.href='2048/index.html'">
            <span class="card-icon">🧩</span>
            <h3>2048 NEON</h3>
            <span style="color:#0f0; font-size:0.55rem; font-weight:bold;">● ONLINE</span>
        </div>
        <div class="card empty">
            <span class="card-icon">🎮</span>
            <h3>SLOT DEV</h3>
        </div>
        <div class="card empty">
            <span class="card-icon">📦</span>
            <h3>VOTRE JEU</h3>
        </div>
    </div>

    <div class="donation-section">
        <button id="pay_button" class="btn-don">SOUTENEZ LE PROJET EN FAISANT UN DON</button>
        <button onclick="forcerNettoyage()" style="background:none; border:none; color:#444; font-size:10px; cursor:pointer; margin-top:10px;">[ RÉINITIALISER LA SESSION ]</button>
    </div>

    <div class="partner-callout">
        <div class="launch-badge">Offre de lancement</div>
        <p style="color: rgba(255,255,255,0.9); margin: 0 0 5px 0; font-size: 1.1rem; font-weight: bold;">
            Rejoignez <strong>JeuxVideo.Pi</strong> et profitez d'une exposition immédiate.
        </p>
        <div class="offer-grid">
            <div class="offer-item"><strong>Loyer 0 Pi</strong><p>Durée limitée</p></div>
            <div class="offer-item"><strong>0% Commission</strong><p>In-Game</p></div>
            <div class="offer-item"><strong>Slot Premium</strong><p>Prioritaire</p></div>
        </div>
    </div>

    <div class="contact-area">
        <div class="contact-title">CONTACT & PARTENARIAT</div>
        <form action="https://formspree.io/f/xwvoaroz" method="POST" class="form-container" id="contactForm">
            <div class="row">
                <input type="text" name="name" placeholder="VOTRE NOM" required>
                <input type="email" name="email" placeholder="VOTRE EMAIL" required>
            </div>
            <textarea name="message" rows="4" placeholder="VOTRE MESSAGE..." required></textarea>
            <button type="submit" class="btn-send" id="btnText">ENVOYER LA TRANSMISSION</button>
        </form>
    </div>

    <footer>
        <span style="color: var(--neon-blue);">✔</span> Certifié WadCox | Écosystème Pi Network
    </footer>

    <script>
        // --- SDK PI ---
        async function initPi() {
            try {
                await Pi.init({ version: "2.0", sandbox: true });
                await Pi.createPayment({}, {
                    onIncompletePaymentFound: (payment) => clorePaiementsBloqués(payment)
                });
            } catch (e) { console.warn("SDK Pi non chargé"); }
        }
        initPi();

        async function clorePaiementsBloqués(payment) {
            try {
                await fetch('https://wadcox44-github-io.vercel.app/api/approve', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId: payment.identifier })
                });
                await Pi.completePayment(payment.identifier);
            } catch (e) { console.error(e); }
        }

        async function forcerNettoyage() {
            if (typeof Pi === 'undefined') return;
            try {
                await Pi.authenticate(['username', 'payments'], clorePaiementsBloqués);
                await Pi.createPayment({ amount: 0.1, memo: "Reset", metadata: { type: "cleanup" } }, {
                    onIncompletePaymentFound: async (p) => { await clorePaiementsBloqués(p); alert("Session nettoyée."); },
                    onReadyForServerApproval: function(id) { },
                    onReadyForServerCompletion: function(id, tx) { Pi.completePayment(id); },
                    onCancel: function(id) { },
                    onError: function(e, p) { if (p) clorePaiementsBloqués(p); }
                });
            } catch (e) { console.log(e.message); }
        }

        async function donnerPi() {
            if (typeof Pi === 'undefined') { alert("Ouvrez PI BROWSER."); return; }
            const montant = prompt("Montant du don (min 1 Pi) :", "1");
            if (!montant || isNaN(montant) || parseFloat(montant) < 1) return;
            try {
                await Pi.authenticate(['username', 'payments'], clorePaiementsBloqués);
                await Pi.createPayment({
                    amount: parseFloat(montant), memo: "Don JeuxVideo.Pi", metadata: { type: "don" }
                }, {
                    onReadyForServerApproval: (id) => fetch('https://wadcox44-github-io.vercel.app/api/approve', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id })
                    }).then(res => res.json()),
                    onReadyForServerCompletion: (id, tx) => { Pi.completePayment(id); alert("Merci pour votre soutien !"); },
                    onCancel: (id) => { },
                    onError: (e, p) => p ? clorePaiementsBloqués(p) : alert("Erreur")
                });
            } catch (err) { console.error(err); }
        }
        document.getElementById('pay_button').onclick = donnerPi;
    </script>
</body>
</html>
