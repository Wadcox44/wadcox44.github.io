<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEUXVIDEO.PI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --neon-gold: #ffaa00; 
            --bg: #050b14; 
            --width-max: 500px; 
        }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        header { padding: 30px 0; text-align: center; width: 100%; }
        h1 { font-family: 'Orbitron'; font-size: 2.2rem; margin: 0; color: white; text-shadow: 0 0 15px var(--neon-blue); }
        .pi-text { color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold); }

        section {
            width: 90%; max-width: var(--width-max); padding: 30px 0;
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
            display: flex; flex-direction: column; align-items: center;
        }

        .category-title {
            width: 100%; font-family: 'Orbitron'; font-size: 0.85rem;
            color: var(--neon-blue); border-left: 3px solid var(--neon-gold);
            padding-left: 10px; margin-bottom: 20px; text-transform: uppercase; box-sizing: border-box;
        }

        /* --- MAIN PROJECT --- */
        .hero-card {
            width: 100%; height: 250px; background: #000; 
            border: 2px solid rgba(255, 170, 0, 0.3); border-radius: 12px;
            overflow: hidden; cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hero-card img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.08); filter: brightness(0.6); transition: all 0.8s ease; }
        .hero-overlay-text { position: absolute; font-family: 'Orbitron'; font-size: 2.5rem; color: var(--neon-gold); text-shadow: 0 0 15px rgba(255,170,0,0.5); letter-spacing: 5px; font-weight: 900; transition: all 0.5s ease; text-align: center; }

        .hero-card:hover { border-color: var(--neon-gold); box-shadow: 0 0 40px rgba(255, 170, 0, 0.4); }
        .hero-card:hover img { transform: scale(1.15); filter: brightness(0.85); }
        .hero-card:hover .hero-overlay-text { letter-spacing: 12px; text-shadow: 0 0 30px var(--neon-gold); }

        /* --- DEVELOPER SHOWCASE --- */
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; margin-bottom: 20px; }
        
        .card {
            background: rgba(16, 33, 62, 0.4); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 10px; height: 130px; position: relative;
            overflow: hidden; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.5s ease;
        }

        .card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); transition: 0.8s ease; }
        .card h3 { position: absolute; bottom: 8px; margin: 0; font-size: 0.55rem; color: var(--neon-blue); text-transform: uppercase; font-family: 'Orbitron'; letter-spacing: 1px; }

        .card-dev-slot { border: 1px dashed rgba(0, 243, 255, 0.4); background: rgba(0, 243, 255, 0.02); }
        .dev-icon { font-size: 1.5rem; color: var(--neon-blue); opacity: 0.5; transition: 0.5s ease; margin-bottom: 5px; }
        .dev-text { font-size: 0.5rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }

        .card:hover { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 243, 255, 0.3); }
        .card:hover img { transform: scale(1.2); filter: brightness(1); }
        .card:hover .dev-icon { opacity: 1; transform: scale(1.2); color: var(--neon-gold); }
        .card:hover h3 { color: white; text-shadow: 0 0 10px var(--neon-blue); }

        /* --- DEVELOPER OFFER STRIP (UPDATED ORDER) --- */
        .dev-offer-strip {
            width: 100%;
            background: rgba(255, 170, 0, 0.05);
            border: 1px solid rgba(255, 170, 0, 0.2);
            border-radius: 8px;
            padding: 15px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 10px;
        }

        .offer-point { text-align: center; flex: 1; }
        .offer-point strong { display: block; color: var(--neon-gold); font-family: 'Orbitron'; font-size: 0.75rem; text-transform: uppercase; }
        .offer-point span { font-size: 0.55rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }

        /* --- SUPPORT & CONTACT --- */
        .donation-title { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 0.85rem; margin-bottom: 20px; text-align: center; }
        .donation-grid { display: flex; gap: 10px; width: 100%; }
        .btn-quick-don { flex: 1; background: #0f1a2e; border: 1px solid var(--neon-blue); color: #fff; padding: 12px; border-radius: 4px; font-family: 'Orbitron'; cursor: pointer; }
        
        .contact-title { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 0.9rem; margin-bottom: 15px; text-align: center; }
        form { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        input, textarea { background: #0f1a2e; border: 1px solid #333; color: white; padding: 12px; border-radius: 4px; font-family: 'Rajdhani'; width: 100%; box-sizing: border-box; }
        .btn-send { background: var(--neon-blue); border: none; padding: 15px; font-weight: bold; border-radius: 4px; font-family: 'Orbitron'; cursor: pointer; color: #000; }
        footer { font-size: 0.7rem; color: #666; padding: 40px 0; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>JEUXVIDEO<span class="pi-text">.PI</span></h1>
    </header>

    <section>
        <div class="category-title">⭐ Main Project</div>
        <div class="hero-card" onclick="window.location.href='https://goldpixel.netlify.app/'">
            <img src="Images/Gold Pixel.png" alt="Gold Pixel Game">
            <div class="hero-overlay-text">GOLD PIXEL</div>
        </div>
    </section>

    <section>
        <div class="category-title">🚀 Developer Showcase</div>
        <div class="game-grid">
            <div class="card" onclick="window.location.href='2048/index.html'">
                <img src="Images/miniature 2048.jpg" alt="2048 Neon">
                <h3>2048 NEON</h3>
            </div>
            <div class="card card-dev-slot" onclick="document.querySelector('textarea').focus();">
                <div class="dev-icon">✚</div>
                <div class="dev-text">Available</div>
                <h3>Deploy Here</h3>
            </div>
            <div class="card card-dev-slot" onclick="document.querySelector('textarea').focus();">
                <div class="dev-icon">✚</div>
                <div class="dev-text">Available</div>
                <h3>Deploy Here</h3>
            </div>
        </div>

        <div class="dev-offer-strip">
            <div class="offer-point">
                <strong>Premium Slot</strong>
                <span>Priority Access</span>
            </div>
            <div class="offer-point" style="border-left: 1px solid rgba(255,170,0,0.2); border-right: 1px solid rgba(255,170,0,0.2);">
                <strong>0 Pi Rent *</strong>
                <span>Claim Now</span>
            </div>
            <div class="offer-point">
                <strong>0% Fee</strong>
                <span>On Transactions</span>
            </div>
        </div>
    </section>

    <section>
        <div class="donation-title">SUPPORT THE PROJECT</div>
        <div class="donation-grid">
            <button class="btn-quick-don">1 Pi</button>
            <button class="btn-quick-don">10 Pi</button>
            <button class="btn-quick-don">CUSTOM</button>
        </div>
    </section>

    <section style="border:none;">
        <div class="contact-title">CONTACT & DEPLOYMENT</div>
        <form action="https://formspree.io/f/xwvoaroz" method="POST">
            <input type="text" name="name" placeholder="Project / Dev Name" required>
            <input type="email" name="email" placeholder="Contact Email" required>
            <textarea name="message" rows="4" placeholder="Link to your game or description..." required></textarea>
            <button type="submit" class="btn-send">SUBMIT MY GAME</button>
        </form>
    </section>

    <footer>✔ Certified WadCox | Pi Network Ecosystem</footer>

</body>
</html>
