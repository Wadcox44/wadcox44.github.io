<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEUXVIDEO.PI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --neon-blue: #00f3ff; --neon-orange: #ffaa00; --bg: #050b14; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: white; 
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* --- Animation Néon du Titre --- */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px var(--neon-blue), 0 0 30px var(--neon-blue);
            }
            20%, 22%, 55% { text-shadow: none; }
        }

        header { padding: 20px 5px 10px; text-align: center; }
        
        h1 { 
            font-family: 'Orbitron', sans-serif; font-size: 1.7rem; margin: 0; 
            color: #fff; text-transform: uppercase; animation: flicker 3s infinite alternate;
            letter-spacing: 1px;
        }
        
        .pi-text { color: var(--neon-orange); animation: none; text-shadow: 0 0 10px var(--neon-orange); }

        /* Bouton Paiement */
        #pay_button {
            background: linear-gradient(90deg, #ff8800, #ffcc00);
            border: none; padding: 12px 20px; font-family: 'Orbitron'; font-size: 0.8rem;
            clip-path: polygon(5% 0, 100% 0, 100% 70%, 95% 100%, 0 100%, 0 30%);
            margin: 15px auto; display: block; cursor: pointer; font-weight: 800; color: #000;
            width: 90%; max-width: 350px; transition: transform 0.2s;
        }
        #pay_button:active { transform: scale(0.98); }
        #pay_button:disabled { background: #555; opacity: 0.6; }

        /* Grille de Jeux */
        .game-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 8px; padding: 10px; width: 95%; margin: 0 auto; box-sizing: border-box;
        }
        
        .card {
            background: rgba(16, 33, 62, 0.8); border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 8px; padding: 12px 5px; text-align: center;
            transition: border-color 0.3s;
        }
        .card:hover { border-color: var(--neon-blue); }
        
        .card-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }
        .card h3 { margin: 0; font-size: 0.65rem; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 0.5px; }
        .empty { border: 1px dashed #444; opacity: 0.5; }

        /* Section Contact */
        .contact-area { 
            width: 100%; background: rgba(0,0,0,0.5); 
            border-top: 1px solid #1a2a4a; padding: 15px 0; margin-top: auto;
        }
        .contact-title { font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 12px; text-align: center; color: var(--neon-blue); letter-spacing: 1px; }
        
        .form-container { width: 90%; margin: auto; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        
        input, textarea { 
            background: #0f1a2e; border: 1px solid #333; color: white; 
            padding: 10px; font-size: 0.9rem; border-radius: 4px; font-family: 'Rajdhani';
        }
        input { flex: 1; width: 45%; }
        textarea { width: 100%; box-sizing: border-box; resize: none; margin-bottom: 8px; }
        
        .btn-send { 
            width: 100%; background: var(--neon-blue); border: none; padding: 12px; 
            font-weight: bold; border-radius: 4px; font-size: 0.9rem; color: #000; cursor: pointer;
            text-transform: uppercase; font-family: 'Orbitron';
        }

        footer { font-size: 0.7rem; color: #555; padding: 15px; text-align: center; width: 100%; box-sizing: border-box; }
        .secure-icon { color: var(--neon-blue); margin-right: 4px; }
    </style>
</head>
<body>

    <header>
        <h1>JEUXVIDEO<span class="pi-text">.PI</span></h1>
        <button id="pay_button">🚀 DEVENIR FONDATEUR (1 PI)</button>
    </header>

    <div class="game-grid">
        <div class="card" onclick="window.location.href='2048/index.html'">
            <span class="card-icon">🧩</span>
            <h3>2048 NEON</h3>
            <span style="color:#0f0; font-size:0.55rem; font-weight:bold;">● ONLINE</span>
        </div>
        <div class="card empty">
            <span class="card-icon">🎮</span>
            <h3>SLOT DEV</h3>
        </div>
        <div class="card empty">
            <span class="card-icon">🚀</span>
            <h3>VOTRE JEU</h3>
        </div>
    </div>

  <form action="https://formspree.io/f/xwvoaroz" method="POST" class="contact-area" id="contactForm">
        <div class="contact-title">PARTENAIRES & STUDIOS</div>
        <div class="form-container">
            <div class="row">
                <input type="text" name="name" placeholder="Nom" required>
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <textarea name="message" rows="3" placeholder="Parlez-nous de votre projet..." required></textarea>
            
            <button type="submit" class="btn-send" id="btnText">ENVOYER</button>
        </div>
    </form>

    <style>
        /* L'animation qui fait tourner le petit cercle */
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        .loader {
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 18px; height: 18px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
    </style>

    <script>
        const form = document.getElementById('contactForm');
        const btn = document.getElementById('btnText');

        form.onsubmit = function() {
            // On remplace le texte par le cercle qui tourne + Patientez
            btn.innerHTML = '<span class="loader"></span> PATIENTEZ...';
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none'; // Empêche de cliquer deux fois
        };
    </script>
    </form>

    <script>
        function submitEffect() {
            const btn = document.getElementById('submit-btn');
            // On vérifie si les champs sont remplis avant de changer le bouton
            if(document.querySelector('textarea').value !== "") {
                btn.innerText = "PATIENTEZ...";
                btn.style.background = "#555";
            }
        }
    </script>

    <footer>
        <span class="secure-icon">✔</span> Certifié WadCox | Écosystème Pi Network
    </footer>

    <script>
        // --- TA LOGIQUE PI SDK ---
        Pi.init({ version: "2.0", sandbox: false });

        async function clorePaiementsBloqués(payment) {
            try {
                await fetch('https://wadcox44-github-io.vercel.app/api/approve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId: payment.identifier })
                });
                await Pi.completePayment(payment.identifier);
            } catch (e) { console.error("Nettoyage :", e); }
        }

        async function donnerPi() {
            const btn = document.getElementById('pay_button');
            try {
                await Pi.authenticate(['username', 'payments'], clorePaiementsBloqués);
                await Pi.createPayment({
                    amount: 1,
                    memo: "Finalisation Etape 10",
                    metadata: { productId: "fondateur-001" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        btn.disabled = true;
                        return fetch('https://wadcox44-github-io.vercel.app/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: paymentId })
                        }).then(res => res.json());
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        Pi.completePayment(paymentId);
                        alert("Bienvenue Fondateur !");
                        window.location.href = "2048/index.html";
                    },
                    onCancel: function(paymentId) { btn.disabled = false; },
                    onError: function(error, payment) {
                        if(payment) { clorePaiementsBloqués(payment); }
                        alert("Synchronisation... Réessayez.");
                        btn.disabled = false;
                    }
                });
            } catch (err) { alert("Erreur : " + err.message); }
        }

        document.getElementById('pay_button').onclick = donnerPi;
    </script>
</body>
</html>
