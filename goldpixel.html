<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GOLD PIXEL</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #ffaa00;
      --gold2: #fcf6ba;
      --gold3: #bf953f;
      --bg: #050b14;
      --bg2: #0a1628;
      --bg3: #0d1e36;
      --border: rgba(255,170,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      cursor: default;
      background: var(--bg);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      /* PAS de touch-action:none ici — cela bloquerait le scroll sur mobile */
      user-select: none;
      -webkit-user-select: none;
    }

    /* Curseur main uniquement sur le canevas */
    #viewport-container { cursor: none; }
    #viewport-container.pan-mode { cursor: grab !important; }
    #viewport-container.pan-mode:active { cursor: grabbing !important; }

    #custom-cursor {
      position: fixed;
      width: 32px;
      height: 32px;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-6px, -4px);
      display: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(255,170,0,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(0,102,204,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER : titre centré, logo à gauche ─── */
    .header {
      width: 100%;
      text-align: center;
      padding: 20px 15px 10px;
      position: relative;
      z-index: 1;
    }

    .logo-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon {
      position: absolute;
      right: calc(100% + 12px);
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }
    .logo-icon svg { width: 100%; height: 100%; }

    .site-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 30%, #ffaa00 55%, #fcf6ba 75%, #bf953f 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: goldShimmer 4s linear infinite;
      letter-spacing: 0.08em;
    }
    @keyframes goldShimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .header-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      color: rgba(255,170,0,0.5);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
      margin-top: 6px;
    }

    /* ─── CANEVAS ─── */
    #viewport-container {
      position: relative;
      width: 95vw;
      max-width: 880px;
      /* Ratio 16:9 strict : hauteur = largeur × (9/16) = largeur × 0.5625 */
      aspect-ratio: 16 / 9;
      border: 2px solid var(--gold);
      border-radius: 10px;
      overflow: hidden;
      background: #030810;
      box-shadow: 0 0 30px rgba(255,170,0,0.15), inset 0 0 20px rgba(0,0,0,0.5);
      touch-action: none;
      z-index: 1;
    }

    #canvas-wrapper {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }
    #canvas-container { transform-origin: top left; will-change: transform; display: block; line-height: 0; }

    #main-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .coords {
      position: absolute;
      bottom: 8px; right: 10px;
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      color: var(--gold);
      background: rgba(0,0,0,0.75);
      padding: 3px 10px;
      border-radius: 4px;
      pointer-events: none;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255,170,0,0.2);
    }

    /* ─── UI ─── */
    .ui {
      width: 95vw;
      max-width: 880px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
      z-index: 1;
    }

    .zoom-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
    }
    .zoom-indicator {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      color: rgba(255,170,0,0.6);
      min-width: 45px;
      text-align: center;
    }

    .tool-bar {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-tool {
      background: transparent;
      border: 1px solid rgba(255,170,0,0.4);
      color: rgba(255,170,0,0.8);
      font-family: 'Orbitron', monospace;
      font-size: 0.62rem;
      padding: 9px 11px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .btn-tool:hover { border-color: var(--gold); color: var(--gold); background: rgba(255,170,0,0.08); }
    .btn-tool.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }
    .btn-tool.danger { border-color: rgba(255,50,50,0.5); color: rgba(255,100,100,0.8); }
    .btn-tool.danger:hover { background: rgba(200,30,30,0.3); color: #ff6666; border-color: #ff4444; }

    /* Bouton PAN spécial quand actif */
    #btn-pan.active { background: #3399ff; border-color: #3399ff; color: #000; }

    .eraser-size-bar {
      display: none;
      gap: 5px;
      align-items: center;
      justify-content: center;
    }
    .eraser-size-bar.visible { display: flex; }
    .size-btn {
      background: transparent;
      border: 1px solid rgba(255,170,0,0.3);
      color: rgba(255,170,0,0.7);
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .size-btn.active { background: rgba(255,170,0,0.2); border-color: var(--gold); color: var(--gold); }

    /* ─── PALETTE ─── */
    .palette-section {
      background: rgba(10,22,40,0.8);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }

    .palette-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      color: rgba(255,170,0,0.5);
      letter-spacing: 0.2em;
      margin-bottom: 8px;
    }

    /* Grille 9 colonnes pour les couleurs normales */
    .palette {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 5px;
      margin-bottom: 8px;
    }

    .c-btn {
      aspect-ratio: 1;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .c-btn:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.4); }
    .c-btn.active { border: 2px solid #fff; box-shadow: 0 0 10px #fff; transform: scale(1.1); }

    /* ─── RANGÉE MÉTAUX : Argent | Or | Bronze centrés avec espacement égal ─── */
    .metals-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 10px;
      padding: 6px 0 0;
    }

    /* Les 3 colonnes de métaux, équidistantes et centrées */
    .metals-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      /* On limite la largeur à 3/9 de la palette = 1/3 */
      width: calc(3 * (100% / 9) + 2 * 5px);
      gap: 5px;
    }

    .metal-swatch {
      aspect-ratio: 1;
      width: 100%;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform 0.15s;
    }
    .metal-swatch:hover { transform: scale(1.1); }
    .metal-swatch.active { border: 2px solid #fff; transform: scale(1.1); }

    /* OR — animation brillance continue */
    #gold-swatch {
      background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 35%, #ffaa00 55%, #fcf6ba 75%, #b38728 100%);
      animation: goldPulse 1.8s ease-in-out infinite;
    }
    @keyframes goldPulse {
      0%,100% { box-shadow: 0 0 4px 1px rgba(255,200,0,0.5); }
      50%      { box-shadow: 0 0 16px 5px rgba(255,200,0,1), 0 0 6px 2px #fffbe0; }
    }
    #gold-swatch.active {
      animation: goldPulseActive 1s ease-in-out infinite;
      border: 2px solid #fff !important;
    }
    @keyframes goldPulseActive {
      0%,100% { box-shadow: 0 0 10px 3px rgba(255,200,0,0.8); transform: scale(1.0); }
      50%      { box-shadow: 0 0 28px 8px var(--gold), 0 0 10px 3px #fff; transform: scale(1.12); }
    }

    /* ARGENT */
    #silver-swatch {
      background: linear-gradient(135deg, #888 0%, #f0f0f0 40%, #C0C0C0 60%, #999 100%);
    }
    #silver-swatch.active { box-shadow: 0 0 12px #ddd; border: 2px solid #fff !important; }

    /* BRONZE */
    #bronze-swatch {
      background: linear-gradient(135deg, #7c4f1e 0%, #e8a96a 40%, #cd7f32 60%, #a0612b 100%);
    }
    #bronze-swatch.active { box-shadow: 0 0 12px #cd7f32; border: 2px solid #fff !important; }

    /* Étiquettes sous chaque métal */
    .metals-labels {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      width: calc(3 * (100% / 9) + 2 * 5px);
      gap: 5px;
    }
    .metal-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.42rem;
      color: rgba(255,170,0,0.6);
      text-align: center;
      letter-spacing: 0.03em;
    }
    .metal-label.silver { color: rgba(192,192,192,0.7); }
    .metal-label.bronze { color: rgba(205,127,50,0.8); }

    /* Compteur OR centré sous l'ensemble, aligné sur la colonne OR (col du milieu) */
    .gold-reserve {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: rgba(255,170,0,0.05);
      border-radius: 6px;
      border: 1px solid rgba(255,170,0,0.15);
      /* Même largeur que les 3 métaux */
      width: calc(3 * (100% / 9) + 2 * 5px);
    }
    .gold-info {
      font-family: 'Orbitron', monospace;
      font-size: 0.62rem;
      color: var(--gold);
      white-space: nowrap;
      text-align: center;
    }
    .gold-bar { width: 100%; height: 5px; background: rgba(255,170,0,0.12); border-radius: 3px; overflow: hidden; }
    .gold-bar-fill { height: 100%; background: linear-gradient(90deg, #bf953f, #ffaa00, #fcf6ba); border-radius: 3px; transition: width 0.3s ease; }

    /* ─── BOUTON PUBLIER ─── */
    .btn-publish {
      background: linear-gradient(135deg, #bf953f, #ffaa00, #fcf6ba, #ffaa00, #bf953f);
      background-size: 200% auto;
      color: #000;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 0.85rem;
      padding: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: background-position 0.4s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,170,0,0.25);
    }
    .btn-publish:hover { background-position: right center; transform: translateY(-1px); box-shadow: 0 6px 30px rgba(255,170,0,0.4); }
    .btn-publish:active { transform: scale(0.98); }
    .btn-publish:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* ─── MODAL ─── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--bg3);
      padding: 28px 24px;
      border: 2px solid var(--gold);
      border-radius: 14px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(255,170,0,0.1);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.92) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-title { font-family: 'Orbitron', monospace; color: var(--gold); font-size: 1rem; margin-bottom: 18px; letter-spacing: 0.1em; }

    #modal input {
      width: 100%; padding: 11px 14px; margin-bottom: 12px;
      background: #050b14; border: 1px solid rgba(255,170,0,0.3);
      color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1rem;
      border-radius: 6px; outline: none; transition: border-color 0.2s;
    }
    #modal input:focus { border-color: var(--gold); }
    #modal input::placeholder { color: rgba(255,255,255,0.25); }

    .modal-status {
      font-family: 'Orbitron', monospace;
      font-size: 0.62rem;
      min-height: 18px;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
      color: rgba(255,170,0,0.8);
    }
    .modal-status.error { color: #ff6666; }
    .modal-status.success { color: #44ff88; }

    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1; padding: 11px;
      font-family: 'Orbitron', monospace; font-size: 0.7rem;
      border: none; border-radius: 6px; cursor: pointer;
      letter-spacing: 0.05em; transition: all 0.2s;
    }
    .modal-btn-confirm { background: var(--gold); color: #000; font-weight: 700; }
    .modal-btn-confirm:hover { background: #fcf6ba; }
    .modal-btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-btn-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.15) !important; }

    /* ─── SECTIONS ─── */
    .section-block { width: 95vw; max-width: 880px; margin-top: 50px; z-index: 1; }
    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      background: linear-gradient(90deg, var(--gold3), var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: 0.06em; white-space: nowrap;
    }
    .section-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,170,0,0.4), transparent); }

    /* ─── GALERIE ─── */
    #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; padding-bottom: 20px; }
    .art-card { background: var(--bg2); border: 1px solid rgba(255,170,0,0.15); border-radius: 10px; overflow: hidden; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }
    .art-card:hover { transform: translateY(-3px); border-color: rgba(255,170,0,0.5); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
    .art-card-header { padding: 10px 14px 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .art-card-title { font-family: 'Orbitron', monospace; font-size: 0.7rem; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .art-card-author { font-size: 0.72rem; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .art-card img { width: 100%; display: block; image-rendering: pixelated; }
    .art-card-footer { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
    .art-date { font-size: 0.65rem; color: rgba(255,255,255,0.2); }
    .btn-vote { background: transparent; border: 1px solid rgba(255,170,0,0.35); color: rgba(255,170,0,0.8); font-family: 'Orbitron', monospace; font-size: 0.65rem; padding: 5px 12px; cursor: pointer; border-radius: 5px; transition: all 0.2s; }
    .btn-vote:hover { background: rgba(255,170,0,0.15); border-color: var(--gold); color: var(--gold); }
    .btn-vote.voted { background: rgba(255,170,0,0.2); border-color: var(--gold); color: var(--gold); }

    /* ─── TOP 10 ─── */
    #top10-list { display: flex; flex-direction: column; gap: 10px; }
    .top-card { display: flex; align-items: center; gap: 14px; background: var(--bg2); border: 1px solid rgba(255,170,0,0.12); border-radius: 10px; padding: 10px 14px; transition: border-color 0.2s; }
    .top-card:hover { border-color: rgba(255,170,0,0.4); }
    .top-card.rank-1 { border-color: rgba(255,215,0,0.5); background: rgba(255,170,0,0.07); }
    .top-card.rank-2 { border-color: rgba(192,192,192,0.4); }
    .top-card.rank-3 { border-color: rgba(205,127,50,0.4); }
    .rank-badge { font-family: 'Orbitron', monospace; font-size: 1.2rem; font-weight: 900; min-width: 36px; text-align: center; }
    .rank-1 .rank-badge { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
    .rank-2 .rank-badge { color: #c0c0c0; }
    .rank-3 .rank-badge { color: #cd7f32; }
    .rank-other .rank-badge { color: rgba(255,255,255,0.3); font-size: 0.9rem; }
    .top-thumb { width: 64px; height: 36px; image-rendering: pixelated; border-radius: 4px; border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; object-fit: cover; background: #081422; }
    .top-info { flex: 1; min-width: 0; }
    .top-title { font-family: 'Orbitron', monospace; font-size: 0.68rem; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-author { font-size: 0.7rem; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .top-votes { font-family: 'Orbitron', monospace; font-size: 0.75rem; color: var(--gold); white-space: nowrap; }

    /* Miniature placeholder Top10 quand pas d'image réelle */
    .top-thumb-placeholder { width: 64px; height: 36px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #081422; font-size: 1.2rem; }

    /* ─── TOAST ─── */
    #toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(10,22,40,0.95); border: 1px solid var(--gold);
      color: var(--gold); font-family: 'Orbitron', monospace; font-size: 0.68rem;
      padding: 12px 24px; border-radius: 8px; z-index: 9999;
      transition: transform 0.3s ease; letter-spacing: 0.06em;
      box-shadow: 0 4px 30px rgba(0,0,0,0.6); white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .gallery-loading { text-align: center; font-family: 'Orbitron', monospace; font-size: 0.7rem; color: rgba(255,170,0,0.4); padding: 40px; letter-spacing: 0.15em; }
    .bottom-spacer { height: 60px; }

    @media (max-width: 480px) {
      .palette, .metals-row, .metals-labels { gap: 3px; }
      .btn-tool { padding: 8px 8px; font-size: 0.56rem; }
    }
  </style>
</head>
<body>

<!-- ─── CURSEUR MAIN PIXEL VINTAGE ─── -->
<div id="custom-cursor">
  <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <!-- Contour noir externe -->
    <rect x="9"  y="1"  width="6" height="2" fill="#000"/>
    <rect x="7"  y="3"  width="2" height="2" fill="#000"/>
    <rect x="15" y="3"  width="2" height="2" fill="#000"/>
    <rect x="7"  y="5"  width="2" height="8" fill="#000"/>
    <rect x="15" y="5"  width="2" height="2" fill="#000"/>
    <rect x="15" y="7"  width="2" height="2" fill="#000"/>
    <rect x="17" y="7"  width="2" height="2" fill="#000"/>
    <rect x="15" y="9"  width="2" height="2" fill="#000"/>
    <rect x="19" y="9"  width="2" height="2" fill="#000"/>
    <rect x="17" y="9"  width="2" height="2" fill="#000"/>
    <rect x="21" y="11" width="2" height="2" fill="#000"/>
    <rect x="19" y="11" width="2" height="2" fill="#000"/>
    <rect x="5"  y="13" width="2" height="2" fill="#000"/>
    <rect x="5"  y="15" width="2" height="12" fill="#000"/>
    <rect x="7"  y="25" width="2" height="2" fill="#000"/>
    <rect x="9"  y="27" width="2" height="2" fill="#000"/>
    <rect x="11" y="27" width="12" height="2" fill="#000"/>
    <rect x="23" y="11" width="2" height="16" fill="#000"/>
    <rect x="7"  y="13" width="2" height="2" fill="#000"/>

    <!-- Corps main — noir intérieur -->
    <rect x="9"  y="3"  width="6" height="2" fill="#1a1a1a"/>
    <rect x="9"  y="5"  width="6" height="8" fill="#1a1a1a"/>
    <rect x="7"  y="13" width="16" height="12" fill="#1a1a1a"/>

    <!-- Doigt index — couleurs arc-en-ciel -->
    <rect x="10" y="2"  width="2" height="2" fill="#ff0000"/>

<script>
// ════════════════════════════════════════════
//  CONSTANTES
// ════════════════════════════════════════════
const COLS     = 80, ROWS = 45, PX = 10;
const CANVAS_W = COLS * PX;   // 800
const CANVAS_H = ROWS * PX;   // 450
const MAX_GOLD = 50;
const BG_COLOR = '#081422';

const COLORS = [
  '#FFFFFF','#DDDDDD','#AAAAAA','#777777','#444444','#222222','#111111','#000000',
  '#C8E8FF','#7AB8F0','#00AAFF','#0066CC','#003880','#001840','#00f3ff','#006688',
  '#CCFFCC','#88FF88','#22DD44','#009922','#005511','#003308','#CCFF00','#66BB00',
  '#FFDBAC','#F1C27D','#E0AC69','#8D5524','#633919','#3B1F0A',
  '#FFEECC','#FF8800','#FF4400','#CC0000','#FF3131','#FF66CC'
];

const METAL = { gold: '#ffaa00', silver: '#C0C0C0', bronze: '#cd7f32' };

// ════════════════════════════════════════════
//  API BASE URL — serveur Render (fixe)
//  Le HTML est hébergé sur GitHub Pages (statique)
//  mais l'API tourne sur Render → URL absolue obligatoire
// ════════════════════════════════════════════
const API = 'https://gold-pixel.onrender.com';

const canvas     = document.getElementById('main-canvas');
const ctx        = canvas.getContext('2d');
const container  = document.getElementById('canvas-container');
const viewportEl = document.getElementById('viewport-container');

canvas.width  = CANVAS_W;
canvas.height = CANVAS_H;

let mode       = 'draw';
let color      = '#FFFFFF';
let isDown     = false;
let eraserSize = 'small';
let goldUsed   = 0;
let currentScale = 1;
let panOffset  = { x: 0, y: 0 };

// Pinch-to-zoom (mode PAN uniquement)
let pinchDist      = null;
let pinchScaleStart = 1;
let panActive      = false;
let panStart       = { x: 0, y: 0 };
let panOffsetStart = { x: 0, y: 0 };

let pixelGrid = Array.from({ length: COLS }, () => new Array(ROWS).fill(null));

// ════════════════════════════════════════════
//  CURSEUR MAIN — visible seulement sur le canevas
// ════════════════════════════════════════════
const cursorEl = document.getElementById('custom-cursor');

document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});
viewportEl.addEventListener('mouseenter', () => { cursorEl.style.display = 'block'; });
viewportEl.addEventListener('mouseleave', () => { cursorEl.style.display = 'none';  });

// ════════════════════════════════════════════
//  DESSIN DU CANEVAS
// ════════════════════════════════════════════
function drawBase() {
  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * PX, 0); ctx.lineTo(c * PX, CANVAS_H); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * PX); ctx.lineTo(CANVAS_W, r * PX); ctx.stroke();
  }
}

function redrawAll() {
  drawBase();
  for (let c = 0; c < COLS; c++)
    for (let r = 0; r < ROWS; r++)
      if (pixelGrid[c][r]) paintCell(c, r, pixelGrid[c][r]);
}

// ── Effacement PROPRE : fond uniquement, AUCUN strokeRect (évite les traces blanches) ──
// La grille de fond est redessinée via drawBase() lors du redrawAll().
// Sur une cellule individuelle, on repose juste le fond : la grille environnante
// reste visible grâce aux lignes continues dessinées par drawBase().
function eraseCell(col, row) {
  const x = col * PX, y = row * PX;
  // Remplissage fond seul — pas de strokeRect qui laisserait un contour blanc
  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(x, y, PX, PX);
}

function paintCell(col, row, fillColor) {
  ctx.fillStyle = fillColor;
  ctx.fillRect(col * PX, row * PX, PX, PX);
  // Contour très subtil uniquement sur les pixels colorés (pas sur BG_COLOR)
  if (fillColor !== BG_COLOR) {
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(col * PX + 0.25, row * PX + 0.25, PX - 0.5, PX - 0.5);
  }
}

// ════════════════════════════════════════════
//  PALETTE
// ════════════════════════════════════════════
const pal = document.getElementById('palette');
COLORS.forEach(c => {
  const b = document.createElement('div');
  b.className = 'c-btn';
  b.style.background = c;
  b.title = c;
  b.onclick = () => {
    color = c;
    setMode('draw');
    document.querySelectorAll('.c-btn, .metal-swatch').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  };
  pal.appendChild(b);
});

function selectMetal(type) {
  if (type === 'gold' && goldUsed >= MAX_GOLD) {
    showToast("RÉSERVE D'OR ÉPUISÉE ! (50/50)");
    return;
  }
  color = METAL[type];
  setMode('draw');
  document.querySelectorAll('.c-btn, .metal-swatch').forEach(x => x.classList.remove('active'));
  document.getElementById(type + '-swatch').classList.add('active');
}

function updateGoldCounter() {
  const rem = MAX_GOLD - goldUsed;
  document.getElementById('goldCount').textContent = rem;
  document.getElementById('goldBarFill').style.width = (rem / MAX_GOLD * 100) + '%';
  if (rem <= 0 && color === METAL.gold) {
    color = '#FFFFFF';
    document.getElementById('gold-swatch').classList.remove('active');
  }
}

// ════════════════════════════════════════════
//  MODES & OUTILS
// ════════════════════════════════════════════
function setMode(m) {
  mode = m;
  document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + m);
  if (btn) btn.classList.add('active');

  const eraserBar = document.getElementById('eraser-size-bar');
  eraserBar.classList.toggle('visible', m === 'erase');

  // En mode gomme : on sélectionne la couleur de fond comme couleur active
  // → paintCell() dessine exactement BG_COLOR = résultat identique au fond, zéro trace
  if (m === 'erase') {
    // La couleur courante devient BG_COLOR, mais on garde l'ancienne en mémoire
    // pour la restaurer si on change de mode
    document.querySelectorAll('.c-btn, .metal-swatch').forEach(x => x.classList.remove('active'));
  }

  if (m === 'pan') {
    viewportEl.classList.add('pan-mode');
    cursorEl.style.display = 'none';
  } else {
    viewportEl.classList.remove('pan-mode');
  }
}

function setEraserSize(sz) {
  eraserSize = sz;
  document.getElementById('sz-small').classList.toggle('active', sz === 'small');
  document.getElementById('sz-big').classList.toggle('active', sz === 'big');
}

function clearAll() {
  if (!confirm('Effacer tout le canevas ?')) return;
  pixelGrid = Array.from({ length: COLS }, () => new Array(ROWS).fill(null));
  goldUsed  = 0;
  updateGoldCounter();
  drawBase();
  localStorage.removeItem('gp_grid_v3');
  localStorage.removeItem('gp_gold_v3');
  showToast('CANEVAS EFFACÉ');
}

// ════════════════════════════════════════════
//  ZOOM & PAN
// ════════════════════════════════════════════
function applyTransform() {
  container.style.transform = `translate(${panOffset.x}px,${panOffset.y}px) scale(${currentScale})`;
  document.getElementById('zoomLabel').textContent = Math.round(currentScale * 100) + '%';
}

function resetView() {
  // Calcule l'échelle pour que le canevas 800px tienne exactement dans le viewport
  const vw = viewportEl.clientWidth;
  currentScale = vw / CANVAS_W;
  panOffset = { x: 0, y: 0 };
  applyTransform();
}

function zoomIn()  { currentScale = Math.min(currentScale * 1.25, 5);  applyTransform(); }
function zoomOut() { currentScale = Math.max(currentScale / 1.25, 0.2); applyTransform(); }

// ════════════════════════════════════════════
//  DESSIN — coordonnées
// ════════════════════════════════════════════
function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const x    = (clientX - rect.left) * (CANVAS_W / rect.width);
  const y    = (clientY - rect.top)  * (CANVAS_H / rect.height);
  return { col: Math.floor(x / PX), row: Math.floor(y / PX) };
}

function handleDraw(clientX, clientY) {
  const { col, row } = getCanvasPos(clientX, clientY);
  document.getElementById('valX').textContent = Math.max(0, Math.min(col, COLS - 1));
  document.getElementById('valY').textContent = Math.max(0, Math.min(row, ROWS - 1));
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  if (mode === 'erase') {
    const half = eraserSize === 'big' ? 1 : 0;
    for (let dc = -half; dc <= half; dc++) {
      for (let dr = -half; dr <= half; dr++) {
        const c2 = col + dc, r2 = row + dr;
        if (c2 < 0 || c2 >= COLS || r2 < 0 || r2 >= ROWS) continue;
        if (pixelGrid[c2][r2] === METAL.gold) goldUsed = Math.max(0, goldUsed - 1);
        pixelGrid[c2][r2] = null;
        eraseCell(c2, r2); // ← fond pur, aucun strokeRect blanc
      }
    }
    updateGoldCounter();

  } else if (mode === 'draw') {
    if (color === METAL.gold) {
      if (goldUsed >= MAX_GOLD) { showToast("RÉSERVE D'OR ÉPUISÉE !"); return; }
      if (pixelGrid[col][row] !== METAL.gold) goldUsed++;
    } else {
      if (pixelGrid[col][row] === METAL.gold) goldUsed = Math.max(0, goldUsed - 1);
    }
    pixelGrid[col][row] = color;
    paintCell(col, row, color);
    updateGoldCounter();
  }
  // Pas de saveBackup() : le canevas repart toujours vide au chargement
}

// ════════════════════════════════════════════
//  EVENTS SOURIS
// ════════════════════════════════════════════
viewportEl.addEventListener('mousedown', e => {
  if (mode === 'pan') {
    panActive      = true;
    panStart       = { x: e.clientX, y: e.clientY };
    panOffsetStart = { ...panOffset };
    return;
  }
  isDown = true;
  handleDraw(e.clientX, e.clientY);
});

window.addEventListener('mousemove', e => {
  if (mode === 'pan' && panActive) {
    panOffset.x = panOffsetStart.x + (e.clientX - panStart.x);
    panOffset.y = panOffsetStart.y + (e.clientY - panStart.y);
    applyTransform();
    return;
  }
  if (isDown) handleDraw(e.clientX, e.clientY);
});

window.addEventListener('mouseup', () => { isDown = false; panActive = false; });

// Coords en temps réel
viewportEl.addEventListener('mousemove', e => {
  if (mode === 'pan') return;
  const { col, row } = getCanvasPos(e.clientX, e.clientY);
  document.getElementById('valX').textContent = Math.max(0, Math.min(col, COLS - 1));
  document.getElementById('valY').textContent = Math.max(0, Math.min(row, ROWS - 1));
});

// ════════════════════════════════════════════
//  EVENTS TACTILES
//  - Mode DRAW/ERASE : 1 doigt = dessine (preventDefault), 2 doigts = ignorés
//  - Mode PAN        : 1 doigt = déplace, 2 doigts = pinch zoom
//  - Hors viewport   : scroll naturel préservé
// ════════════════════════════════════════════
viewportEl.addEventListener('touchstart', e => {
  // Toujours preventDefault sur le viewport pour éviter scroll accidentel pendant dessin
  e.preventDefault();

  if (mode === 'pan') {
    if (e.touches.length === 1) {
      panActive      = true;
      panStart       = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      panOffsetStart = { ...panOffset };
    } else if (e.touches.length === 2) {
      panActive  = false;
      pinchDist  = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      pinchScaleStart = currentScale;
    }
  } else {
    if (e.touches.length === 1) {
      isDown = true;
      handleDraw(e.touches[0].clientX, e.touches[0].clientY);
    }
    if (e.touches.length >= 2) {
      isDown = false;
    }
  }
}, { passive: false });

viewportEl.addEventListener('touchmove', e => {
  e.preventDefault();

  if (mode === 'pan') {
    if (e.touches.length === 1 && panActive) {
      panOffset.x = panOffsetStart.x + (e.touches[0].clientX - panStart.x);
      panOffset.y = panOffsetStart.y + (e.touches[0].clientY - panStart.y);
      applyTransform();
    } else if (e.touches.length === 2 && pinchDist !== null) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      currentScale = Math.max(0.2, Math.min(5, pinchScaleStart * (dist / pinchDist)));
      applyTransform();
    }
  } else {
    if (e.touches.length === 1 && isDown) {
      handleDraw(e.touches[0].clientX, e.touches[0].clientY);
      const { col, row } = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
      document.getElementById('valX').textContent = Math.max(0, Math.min(col, COLS - 1));
      document.getElementById('valY').textContent = Math.max(0, Math.min(row, ROWS - 1));
    }
  }
}, { passive: false });

viewportEl.addEventListener('touchend', e => {
  if (e.touches.length === 0) { isDown = false; panActive = false; }
  if (e.touches.length < 2)   { pinchDist = null; }
}, { passive: false });

// ════════════════════════════════════════════
//  SAUVEGARDE LOCALE
// ════════════════════════════════════════════
function saveBackup() {
  try {
    localStorage.setItem('gp_grid_v3', JSON.stringify(pixelGrid));
    localStorage.setItem('gp_gold_v3', String(goldUsed));
  } catch(e) {}
}

function loadBackup() {
  try {
    const saved     = localStorage.getItem('gp_grid_v3');
    const savedGold = localStorage.getItem('gp_gold_v3');
    if (saved) {
      pixelGrid = JSON.parse(saved);
      goldUsed  = savedGold ? parseInt(savedGold) : 0;
      redrawAll();
      updateGoldCounter();
    }
  } catch(e) {}
}

// ════════════════════════════════════════════
//  MODAL & PUBLICATION
// ════════════════════════════════════════════
function openModal() {
  document.getElementById('modal-status').textContent = '';
  document.getElementById('modal-status').className   = 'modal-status';
  document.getElementById('btn-send').disabled        = false;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('p-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

async function publish() {
  const name  = document.getElementById('p-name').value.trim();
  const title = document.getElementById('p-title').value.trim();
  const statusEl = document.getElementById('modal-status');
  const sendBtn  = document.getElementById('btn-send');

  if (!name || !title) {
    statusEl.textContent = '⚠ REMPLIS TON PSEUDO ET LE TITRE !';
    statusEl.className   = 'modal-status error';
    return;
  }

  sendBtn.disabled     = true;
  statusEl.textContent = '⏳ ENVOI EN COURS...';
  statusEl.className   = 'modal-status';

  // WebP sans perte (quality 1.0) : idéal pour le pixel art
  // Plus léger que PNG, plus net que JPEG, parfait pour MongoDB
  const img      = canvas.toDataURL('image/webp', 1.0);
  const endpoint = `${API}/api/save`;

  try {
    const res = await fetch(endpoint, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ name, title, img })
    });

    console.log('📥 Réponse status :', res.status, res.statusText);

    if (res.ok) {
      statusEl.textContent = '✦ PUBLIÉ AVEC SUCCÈS !';
      statusEl.className   = 'modal-status success';
      setTimeout(() => {
        closeModal();
        loadGallery();
        loadTop10();
        showToast('✦ ŒUVRE PUBLIÉE DANS LA GALERIE !');
      }, 1200);
    } else {
      let errMsg = 'ERREUR ' + res.status;
      try {
        const j = await res.json();
        if (j.error) errMsg += ' : ' + j.error;
        console.error('❌ Erreur API:', j);
      } catch(_) {}
      statusEl.textContent = '✗ ' + errMsg;
      statusEl.className   = 'modal-status error';
      sendBtn.disabled     = false;
    }
  } catch (err) {
    console.error('❌ Erreur réseau:', err);
    statusEl.textContent = '✗ CONNEXION IMPOSSIBLE — VÉRIFIE RENDER';
    statusEl.className   = 'modal-status error';
    sendBtn.disabled     = false;
  }
}

// ════════════════════════════════════════════
//  GALERIE
// ════════════════════════════════════════════
async function loadGallery() {
  const gal = document.getElementById('gallery');
  gal.innerHTML = '<div class="gallery-loading">CHARGEMENT...</div>';
  try {
    const res  = await fetch(`${API}/api/gallery`);
    const data = await res.json();
    if (!data.length) {
      gal.innerHTML = '<div class="gallery-loading">AUCUNE CRÉATION POUR L\'INSTANT</div>';
      return;
    }
    gal.innerHTML = data.map(art => `
      <div class="art-card">
        <div class="art-card-header">
          <div class="art-card-title">${esc(art.title)}</div>
          <div class="art-card-author">par @${esc(art.name)}</div>
        </div>
        <img src="${art.img}" alt="${esc(art.title)}" loading="lazy">
        <div class="art-card-footer">
          <span class="art-date">${fmtDate(art.createdAt)}</span>
          <button class="btn-vote" onclick="vote('${art.id}',this)">⭐ ${art.votes}</button>
        </div>
      </div>`).join('');
  } catch(e) {
    gal.innerHTML = '<div class="gallery-loading">ERREUR DE CHARGEMENT</div>';
  }
}

const MEDALS = ['🥇','🥈','🥉'];

async function loadTop10() {
  const list = document.getElementById('top10-list');
  list.innerHTML = '<div class="gallery-loading">CHARGEMENT...</div>';

  let data = [];
  try {
    const res = await fetch(`${API}/api/top10`);
    data = await res.json();
  } catch(_) {}

  // Si moins de 10 résultats réels, on complète avec les fictifs
  const items = data.length >= 10 ? data.slice(0, 10) : data;
  const needFake = items.length < 10;

  if (!items.length && needFake) {
    // Aucune donnée réelle : afficher les 10 fictifs
    list.innerHTML = FAKE_TOP10.map(f => renderFakeTop(f)).join('');
    return;
  }

  // Données réelles disponibles
  const realHTML = items.map((art, i) => {
    const rankClass = i < 3 ? `rank-${i+1}` : 'rank-other';
    const badge     = i < 3 ? MEDALS[i] : `#${i+1}`;
    return `
      <div class="top-card ${rankClass}">
        <div class="rank-badge">${badge}</div>
        <img class="top-thumb" src="${art.img}" alt="${esc(art.title)}" onerror="this.style.display='none'">
        <div class="top-info">
          <div class="top-title">${esc(art.title)}</div>
          <div class="top-author">@${esc(art.name)}</div>
        </div>
        <div class="top-votes">⭐ ${art.votes}</div>
      </div>`;
  }).join('');

  // Compléter avec fictifs si nécessaire
  const fakeHTML = needFake
    ? FAKE_TOP10.slice(items.length, 10).map((f, i) => {
        const rank = items.length + i + 1;
        return renderFakeTop({ ...f, rank });
      }).join('')
    : '';

  list.innerHTML = realHTML + fakeHTML;
}

function renderFakeTop(f) {
  const rankClass = f.rank <= 3 ? `rank-${f.rank}` : 'rank-other';
  const badge     = f.rank <= 3 ? MEDALS[f.rank - 1] : `#${f.rank}`;
  return `
    <div class="top-card ${rankClass}">
      <div class="rank-badge">${badge}</div>
      <div class="top-thumb-placeholder">${f.emoji}</div>
      <div class="top-info">
        <div class="top-title">${esc(f.title)}</div>
        <div class="top-author">@${esc(f.author)} <span style="color:rgba(255,170,0,0.3);font-size:0.55rem;">(test)</span></div>
      </div>
      <div class="top-votes">⭐ ${f.votes}</div>
    </div>`;
}

// ════════════════════════════════════════════
//  VOTE
// ════════════════════════════════════════════
async function vote(id, btn) {
  btn.classList.add('voted');
  btn.disabled = true;
  try {
    const res  = await fetch(`${API}/api/vote`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ id })
    });
    const data = await res.json();
    btn.textContent = `⭐ ${data.votes}`;
    loadTop10();
  } catch(e) {
    btn.classList.remove('voted');
    btn.disabled = false;
  }
}

// ════════════════════════════════════════════
//  UTILITAIRES
// ════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'});
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}
