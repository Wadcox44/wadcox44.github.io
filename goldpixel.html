<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GOLD PIXEL</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #ffaa00;
      --gold2: #fcf6ba;
      --gold3: #bf953f;
      --bg: #050b14;
      --bg2: #0a1628;
      --bg3: #0d1e36;
      --border: rgba(255,170,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── CURSEUR STYLO PERSONNALISÉ ─── */
    body {
      cursor: none;
      background: var(--bg);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      touch-action: none;
      user-select: none;
    }

    #custom-cursor {
      position: fixed;
      width: 24px;
      height: 24px;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-4px, -20px);
      transition: transform 0.05s ease;
    }
    #custom-cursor svg { filter: drop-shadow(0 0 4px var(--gold)); }

    /* ─── FOND ANIMÉ ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(255,170,0,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(0,102,204,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER & LOGO ─── */
    .header {
      width: 100%;
      text-align: center;
      padding: 20px 15px 10px;
      position: relative;
      z-index: 1;
    }

    .logo-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 6px;
    }

    /* Logo pixel 3D doré */
    .logo-icon {
      width: 48px;
      height: 48px;
      position: relative;
      flex-shrink: 0;
    }
    .logo-icon svg { width: 100%; height: 100%; }

    .site-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 30%, #ffaa00 55%, #fcf6ba 75%, #bf953f 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: goldShimmer 4s linear infinite;
      letter-spacing: 0.08em;
    }
    @keyframes goldShimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .header-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      color: rgba(255,170,0,0.5);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* ─── VIEWPORT CANEVAS ─── */
    #viewport-container {
      position: relative;
      width: 95vw;
      max-width: 880px;
      border: 2px solid var(--gold);
      border-radius: 10px;
      overflow: hidden;
      background: #030810;
      box-shadow: 0 0 30px rgba(255,170,0,0.15), inset 0 0 20px rgba(0,0,0,0.5);
      touch-action: none;
      z-index: 1;
    }

    #canvas-wrapper {
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    #canvas-container {
      transform-origin: top left;
      will-change: transform;
      display: block;
    }

    #main-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .coords {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      color: var(--gold);
      background: rgba(0,0,0,0.75);
      padding: 3px 10px;
      border-radius: 4px;
      pointer-events: none;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255,170,0,0.2);
    }

    /* ─── UI PRINCIPALE ─── */
    .ui {
      width: 95vw;
      max-width: 880px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
      z-index: 1;
    }

    /* ─── BARRE D'OUTILS ─── */
    .tool-bar {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-tool {
      background: transparent;
      border: 1px solid rgba(255,170,0,0.4);
      color: rgba(255,170,0,0.8);
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      padding: 9px 12px;
      cursor: none;
      border-radius: 6px;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .btn-tool:hover { border-color: var(--gold); color: var(--gold); background: rgba(255,170,0,0.08); }
    .btn-tool.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }
    .btn-tool.danger { border-color: rgba(255,50,50,0.5); color: rgba(255,100,100,0.8); }
    .btn-tool.danger:hover { background: rgba(200,30,30,0.3); color: #ff6666; border-color: #ff4444; }

    /* Sélecteur taille gomme */
    .eraser-size-bar {
      display: none;
      gap: 5px;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      color: rgba(255,170,0,0.6);
    }
    .eraser-size-bar.visible { display: flex; }
    .size-btn {
      background: transparent;
      border: 1px solid rgba(255,170,0,0.3);
      color: rgba(255,170,0,0.7);
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      padding: 5px 10px;
      cursor: none;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .size-btn.active { background: rgba(255,170,0,0.2); border-color: var(--gold); color: var(--gold); }

    /* ─── PALETTE ─── */
    .palette-section {
      background: rgba(10,22,40,0.8);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }

    .palette-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      color: rgba(255,170,0,0.5);
      letter-spacing: 0.2em;
      margin-bottom: 10px;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 5px;
      margin-bottom: 10px;
    }

    .c-btn {
      aspect-ratio: 1;
      border-radius: 4px;
      cursor: none;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .c-btn:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.4); }
    .c-btn.active { border: 2px solid #fff; box-shadow: 0 0 10px #fff; transform: scale(1.1); }

    /* Bouton OR spécial — même taille que les swatches, centré */
    .gold-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 6px 0 2px;
    }

    #gold-swatch {
      /* Même dimensions qu'un swatch de palette */
      aspect-ratio: 1;
      width: calc((100% - 40px) / 9); /* identique aux .c-btn dans la grille 9 colonnes */
      min-width: 28px;
      max-width: 42px;
      background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 35%, #ffaa00 55%, #fcf6ba 75%, #b38728 100%);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      cursor: none;
      flex-shrink: 0;
      /* Glow permanent, s'intensifie quand actif */
      animation: goldGlowIdle 2s infinite alternate;
    }
    @keyframes goldGlowIdle {
      from { box-shadow: 0 0 6px rgba(255,170,0,0.5), 0 0 2px rgba(255,220,80,0.3); }
      to   { box-shadow: 0 0 14px rgba(255,170,0,0.8), 0 0 6px rgba(255,220,80,0.5); }
    }
    #gold-swatch.active {
      animation: goldGlowActive 1s infinite alternate;
      border: 2px solid #fff;
    }
    @keyframes goldGlowActive {
      from { box-shadow: 0 0 10px rgba(255,200,0,0.7), 0 0 4px #fff; transform: scale(1.0); }
      to   { box-shadow: 0 0 26px var(--gold), 0 0 10px #fffbe0; transform: scale(1.1); }
    }

    .gold-info {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      color: var(--gold);
      line-height: 1.6;
    }

    .gold-bar {
      width: 120px;
      height: 6px;
      background: rgba(255,170,0,0.15);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .gold-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #bf953f, #ffaa00, #fcf6ba);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* ─── BOUTON ZOOM ─── */
    .zoom-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
    }
    .zoom-indicator {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      color: rgba(255,170,0,0.6);
      min-width: 45px;
      text-align: center;
    }

    /* ─── BOUTON PUBLIER ─── */
    .btn-publish {
      background: linear-gradient(135deg, #bf953f, #ffaa00, #fcf6ba, #ffaa00, #bf953f);
      background-size: 200% auto;
      color: #000;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 0.85rem;
      padding: 14px;
      border: none;
      border-radius: 8px;
      cursor: none;
      letter-spacing: 0.08em;
      transition: background-position 0.4s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255,170,0,0.25);
    }
    .btn-publish:hover {
      background-position: right center;
      transform: translateY(-1px);
      box-shadow: 0 6px 30px rgba(255,170,0,0.4);
    }
    .btn-publish:active { transform: scale(0.98); }

    /* ─── MODAL ─── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--bg3);
      padding: 28px 24px;
      border: 2px solid var(--gold);
      border-radius: 14px;
      z-index: 201;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(255,170,0,0.1);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.92) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-family: 'Orbitron', monospace;
      color: var(--gold);
      font-size: 1rem;
      margin-bottom: 20px;
      letter-spacing: 0.1em;
    }

    #modal input {
      width: 100%;
      padding: 11px 14px;
      margin-bottom: 12px;
      background: #050b14;
      border: 1px solid rgba(255,170,0,0.3);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    #modal input:focus { border-color: var(--gold); }
    #modal input::placeholder { color: rgba(255,255,255,0.25); }

    .modal-btns { display: flex; gap: 10px; margin-top: 6px; }
    .modal-btns button {
      flex: 1;
      padding: 11px;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      border: none;
      border-radius: 6px;
      cursor: none;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .modal-btn-confirm { background: var(--gold); color: #000; font-weight: 700; }
    .modal-btn-confirm:hover { background: #fcf6ba; }
    .modal-btn-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.15) !important; }

    /* ─── SECTIONS GALERIE & TOP 10 ─── */
    .section-block {
      width: 95vw;
      max-width: 880px;
      margin-top: 50px;
      z-index: 1;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      background: linear-gradient(90deg, var(--gold3), var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.06em;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,170,0,0.4), transparent);
    }

    /* Galerie */
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding-bottom: 20px;
    }

    .art-card {
      background: var(--bg2);
      border: 1px solid rgba(255,170,0,0.15);
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .art-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,170,0,0.5);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .art-card-header {
      padding: 10px 14px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .art-card-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      color: var(--gold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.05em;
    }
    .art-card-author {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }

    .art-card img {
      width: 100%;
      display: block;
      image-rendering: pixelated;
    }

    .art-card-footer {
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .art-date {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
    }

    .btn-vote {
      background: transparent;
      border: 1px solid rgba(255,170,0,0.35);
      color: rgba(255,170,0,0.8);
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      padding: 5px 12px;
      cursor: none;
      border-radius: 5px;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .btn-vote:hover { background: rgba(255,170,0,0.15); border-color: var(--gold); color: var(--gold); }
    .btn-vote.voted { background: rgba(255,170,0,0.2); border-color: var(--gold); color: var(--gold); }

    /* ─── TOP 10 ─── */
    #top10-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .top-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg2);
      border: 1px solid rgba(255,170,0,0.12);
      border-radius: 10px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .top-card:hover { border-color: rgba(255,170,0,0.4); }
    .top-card.rank-1 { border-color: rgba(255,215,0,0.5); background: rgba(255,170,0,0.07); }
    .top-card.rank-2 { border-color: rgba(192,192,192,0.4); }
    .top-card.rank-3 { border-color: rgba(205,127,50,0.4); }

    .rank-badge {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      font-weight: 900;
      min-width: 36px;
      text-align: center;
    }
    .rank-1 .rank-badge { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
    .rank-2 .rank-badge { color: #c0c0c0; }
    .rank-3 .rank-badge { color: #cd7f32; }
    .rank-other .rank-badge { color: rgba(255,255,255,0.3); font-size: 0.9rem; }

    .top-thumb {
      width: 64px;
      height: 36px;
      image-rendering: pixelated;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .top-info { flex: 1; min-width: 0; }
    .top-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.68rem;
      color: var(--gold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-author {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }

    .top-votes {
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      color: var(--gold);
      white-space: nowrap;
    }

    /* ─── TOAST NOTIFICATION ─── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(10,22,40,0.95);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      padding: 12px 24px;
      border-radius: 8px;
      z-index: 9999;
      transition: transform 0.3s ease;
      letter-spacing: 0.06em;
      box-shadow: 0 4px 30px rgba(0,0,0,0.6);
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── LOADER GALERIE ─── */
    .gallery-loading {
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      color: rgba(255,170,0,0.4);
      padding: 40px;
      letter-spacing: 0.15em;
    }

    /* ─── BOTTOM PADDING ─── */
    .bottom-spacer { height: 60px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 480px) {
      .palette { grid-template-columns: repeat(9, 1fr); gap: 3px; }
      .tool-bar { gap: 4px; }
      .btn-tool { padding: 8px 9px; font-size: 0.58rem; }
    }
  </style>
</head>
<body>

<!-- Curseur stylo personnalisé -->
<div id="custom-cursor">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 21L8.5 19L19.5 8L16 4.5L5 15.5L3 21Z" fill="#ffaa00" stroke="#fff" stroke-width="0.8"/>
    <path d="M16 4.5L19.5 8L21 6.5L17.5 3L16 4.5Z" fill="#fff" stroke="#ffaa00" stroke-width="0.5"/>
    <circle cx="3.5" cy="20.5" r="1" fill="#ffaa00"/>
  </svg>
</div>

<!-- ─── HEADER ─── -->
<div class="header">
  <div class="logo-wrapper">
    <!-- Logo pixel 3D doré -->
    <div class="logo-icon">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="goldFace" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fcf6ba"/>
            <stop offset="40%" stop-color="#ffaa00"/>
            <stop offset="100%" stop-color="#bf953f"/>
          </linearGradient>
          <linearGradient id="goldRight" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8a6200"/>
            <stop offset="100%" stop-color="#bf953f"/>
          </linearGradient>
          <linearGradient id="goldTop" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ffaa00"/>
            <stop offset="100%" stop-color="#fcf6ba"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Face avant -->
        <rect x="10" y="18" width="24" height="24" fill="url(#goldFace)" filter="url(#glow)"/>
        <!-- Face droite (ombre) -->
        <polygon points="34,18 42,10 42,34 34,42" fill="url(#goldRight)"/>
        <!-- Face top -->
        <polygon points="10,18 18,10 42,10 34,18" fill="url(#goldTop)"/>
        <!-- Brillance -->
        <rect x="13" y="21" width="6" height="6" fill="rgba(255,255,255,0.4)" rx="1"/>
        <rect x="13" y="29" width="3" height="3" fill="rgba(255,255,255,0.15)" rx="0.5"/>
        <!-- Contour -->
        <rect x="10" y="18" width="24" height="24" fill="none" stroke="rgba(255,200,0,0.5)" stroke-width="0.5"/>
        <polygon points="34,18 42,10 42,34 34,42" fill="none" stroke="rgba(255,200,0,0.3)" stroke-width="0.5"/>
        <polygon points="10,18 18,10 42,10 34,18" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
      </svg>
    </div>
    <div class="site-title">GOLD PIXEL</div>
  </div>
  <div class="header-sub">Studio Pixel Art · Pi Network</div>
</div>

<!-- ─── CANEVAS 80x45 ─── -->
<div id="viewport-container">
  <div id="canvas-wrapper">
    <div id="canvas-container">
      <canvas id="main-canvas" width="800" height="450"></canvas>
    </div>
  </div>
  <div class="coords">X: <span id="valX">0</span> | Y: <span id="valY">0</span></div>
</div>

<!-- ─── UI ─── -->
<div class="ui">

  <!-- Zoom -->
  <div class="zoom-bar">
    <button class="btn-tool" onclick="zoomOut()">－</button>
    <span class="zoom-indicator" id="zoomLabel">100%</span>
    <button class="btn-tool" onclick="zoomIn()">＋</button>
    <button class="btn-tool" onclick="resetView()" style="margin-left:8px;">⊙ RECENTRER</button>
  </div>

  <!-- Outils -->
  <div class="tool-bar">
    <button id="btn-draw" class="btn-tool active" onclick="setMode('draw')">✏ PIXEL</button>
    <button id="btn-erase" class="btn-tool" onclick="setMode('erase')">◻ GOMME</button>
    <button class="btn-tool danger" onclick="clearAll()">✕ EFFACER TOUT</button>
  </div>

  <!-- Taille gomme -->
  <div class="eraser-size-bar" id="eraser-size-bar">
    <span style="font-size:0.6rem; color:rgba(255,170,0,0.5); letter-spacing:0.1em;">TAILLE :</span>
    <button class="size-btn active" id="sz-small" onclick="setEraserSize('small')">PETIT (1px)</button>
    <button class="size-btn" id="sz-big" onclick="setEraserSize('big')">GRAND (3px)</button>
  </div>

  <!-- Palette -->
  <div class="palette-section">
    <div class="palette-label">PALETTE DE COULEURS</div>
    <div class="palette" id="palette"></div>

    <!-- Bouton Or centré -->
    <div class="gold-row">
      <div id="gold-swatch" onclick="selectGold()" title="Couleur Or — limité à 50 pixels"></div>
      <div class="gold-info">
        <div style="letter-spacing:0.1em;">✦ OR SPÉCIAL</div>
        <div>RÉSERVE : <span id="goldCount">50</span>/50 PX</div>
        <div class="gold-bar"><div class="gold-bar-fill" id="goldBarFill" style="width:100%"></div></div>
      </div>
    </div>
  </div>

  <!-- Publier -->
  <button class="btn-publish" onclick="openModal()">▲ PARTAGER SUR LA GALERIE PARTAGÉE</button>

</div>

<!-- ─── MODAL ─── -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-title">✦ PUBLICATION</div>
    <input type="text" id="p-name" placeholder="Ton pseudo" maxlength="30" autocomplete="off">
    <input type="text" id="p-title" placeholder="Nom de l'œuvre" maxlength="60" autocomplete="off">
    <div class="modal-btns">
      <button class="modal-btn-confirm" onclick="publish()">ENVOYER</button>
      <button class="modal-btn-cancel" onclick="closeModal()">ANNULER</button>
    </div>
  </div>
</div>

<!-- ─── TOP 10 ─── -->
<div class="section-block">
  <div class="section-header">
    <span class="section-title">✦ CLASSEMENT TOP 10</span>
    <div class="section-line"></div>
  </div>
  <div id="top10-list"><div class="gallery-loading">CHARGEMENT...</div></div>
</div>

<!-- ─── GALERIE ─── -->
<div class="section-block">
  <div class="section-header">
    <span class="section-title">GALERIE DES CRÉATIONS</span>
    <div class="section-line"></div>
  </div>
  <div id="gallery"><div class="gallery-loading">CHARGEMENT...</div></div>
</div>

<div class="bottom-spacer"></div>

<!-- ─── TOAST ─── -->
<div id="toast"></div>

<!-- ─── SCRIPT ─── -->
<script>
// ══════════════════════════════════════════════
//  CONSTANTES & CONFIG
// ══════════════════════════════════════════════
const COLS = 80, ROWS = 45, PX = 10; // 80x45 = 800x450px
const CANVAS_W = COLS * PX; // 800
const CANVAS_H = ROWS * PX; // 450
const MAX_GOLD = 50;
const BG_COLOR = '#081422'; // Couleur de fond du canevas — source unique de vérité

const COLORS = [
  "#FFFFFF","#DDDDDD","#AAAAAA","#777777","#444444","#222222","#111111","#000000",
  "#C8E8FF","#7AB8F0","#00AAFF","#0066CC","#003880","#001840","#00f3ff","#006688",
  "#CCFFCC","#88FF88","#22DD44","#009922","#005511","#003308","#CCFF00","#66BB00",
  "#FFDBAC","#F1C27D","#E0AC69","#8D5524","#633919","#3B1F0A",
  "#FFEECC","#FF8800","#FF4400","#CC0000","#FF3131","#FF66CC"
];

const GOLD_COLOR = '#ffaa00';

// ══════════════════════════════════════════════
//  CURSEUR PERSONNALISÉ
// ══════════════════════════════════════════════
const cursor = document.getElementById('custom-cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// ══════════════════════════════════════════════
//  ÉTAT DE L'APP
// ══════════════════════════════════════════════
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvas-container');
const viewport = document.getElementById('viewport-container');

canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

let mode = 'draw';
let color = '#FFFFFF';
let isDown = false;
let eraserSize = 'small'; // 'small'=1px, 'big'=3px
let goldUsed = 0;
let currentScale = 1;

// Grille de pixels [col][row] -> couleur ou null
let pixelGrid = Array.from({length: COLS}, () => new Array(ROWS).fill(null));

// Pinch-to-zoom
let pinchDist = null;
let pinchScaleStart = 1;

// Pan
let isPanning = false;
let panStart = { x: 0, y: 0 };
let panOffset = { x: 0, y: 0 };
let panStartOffset = { x: 0, y: 0 };

// ══════════════════════════════════════════════
//  DESSIN DU CANEVAS
// ══════════════════════════════════════════════
function drawBase() {
  // Fond sombre
  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  // Grille visible
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * PX, 0); ctx.lineTo(c * PX, CANVAS_H); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * PX); ctx.lineTo(CANVAS_W, r * PX); ctx.stroke();
  }
}

function redrawAll() {
  drawBase();
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      if (pixelGrid[c][r]) {
        paintPixelOnCanvas(c, r, pixelGrid[c][r]);
      }
    }
  }
}

function paintPixelOnCanvas(col, row, fillColor) {
  ctx.fillStyle = fillColor;
  ctx.fillRect(col * PX, row * PX, PX, PX);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(col * PX, row * PX, PX, PX);
}

// ══════════════════════════════════════════════
//  PALETTE
// ══════════════════════════════════════════════
const pal = document.getElementById('palette');
COLORS.forEach(c => {
  const b = document.createElement('div');
  b.className = 'c-btn';
  b.style.background = c;
  b.title = c;
  b.onclick = () => {
    color = c;
    setMode('draw');
    document.querySelectorAll('.c-btn, #gold-swatch').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  };
  pal.appendChild(b);
});

function selectGold() {
  if (goldUsed >= MAX_GOLD) { showToast("RÉSERVE D'OR ÉPUISÉE ! (50/50)"); return; }
  color = GOLD_COLOR;
  setMode('draw');
  document.querySelectorAll('.c-btn').forEach(x => x.classList.remove('active'));
  document.getElementById('gold-swatch').classList.add('active');
}

function updateGoldCounter() {
  const remaining = MAX_GOLD - goldUsed;
  document.getElementById('goldCount').textContent = remaining;
  document.getElementById('goldBarFill').style.width = (remaining / MAX_GOLD * 100) + '%';
  if (remaining <= 0 && color === GOLD_COLOR) {
    color = '#FFFFFF';
    document.getElementById('gold-swatch').classList.remove('active');
  }
}

// ══════════════════════════════════════════════
//  OUTILS & MODES
// ══════════════════════════════════════════════
function setMode(m) {
  mode = m;
  document.querySelectorAll('.btn-tool').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + m);
  if (btn) btn.classList.add('active');
  // Afficher sélecteur gomme
  const eraserBar = document.getElementById('eraser-size-bar');
  if (m === 'erase') { eraserBar.classList.add('visible'); }
  else { eraserBar.classList.remove('visible'); }
}

function setEraserSize(sz) {
  eraserSize = sz;
  document.getElementById('sz-small').classList.toggle('active', sz === 'small');
  document.getElementById('sz-big').classList.toggle('active', sz === 'big');
}

function clearAll() {
  if (!confirm("Effacer tout le canevas ?")) return;
  pixelGrid = Array.from({length: COLS}, () => new Array(ROWS).fill(null));
  goldUsed = 0;
  updateGoldCounter();
  drawBase(); // Redessine proprement le fond + grille
  // Supprime la sauvegarde locale pour qu'un refresh parte sur un canevas vide
  localStorage.removeItem('gp_grid_v3');
  localStorage.removeItem('gp_gold_v3');
  showToast("CANEVAS EFFACÉ");
}

// ══════════════════════════════════════════════
//  ZOOM & PAN
// ══════════════════════════════════════════════
function applyTransform() {
  container.style.transform = `translate(${panOffset.x}px, ${panOffset.y}px) scale(${currentScale})`;
  document.getElementById('zoomLabel').textContent = Math.round(currentScale * 100) + '%';
}

function resetView() {
  const vw = viewport.offsetWidth;
  currentScale = vw / CANVAS_W;
  panOffset = { x: 0, y: 0 };
  applyTransform();
}

function zoomIn() {
  currentScale = Math.min(currentScale * 1.25, 5);
  applyTransform();
}

function zoomOut() {
  currentScale = Math.max(currentScale / 1.25, 0.2);
  applyTransform();
}

// ══════════════════════════════════════════════
//  GESTION DESSIN
// ══════════════════════════════════════════════
function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  // Conversion client -> canvas pixel
  const x = (clientX - rect.left) * (CANVAS_W / rect.width);
  const y = (clientY - rect.top) * (CANVAS_H / rect.height);
  const col = Math.floor(x / PX);
  const row = Math.floor(y / PX);
  return { col, row, x, y };
}

function handleDraw(clientX, clientY) {
  const { col, row } = getCanvasPos(clientX, clientY);
  document.getElementById('valX').textContent = Math.max(0, Math.min(col, COLS - 1));
  document.getElementById('valY').textContent = Math.max(0, Math.min(row, ROWS - 1));

  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  if (mode === 'erase') {
    const half = eraserSize === 'big' ? 1 : 0;
    for (let dc = -half; dc <= half; dc++) {
      for (let dr = -half; dr <= half; dr++) {
        const c2 = col + dc, r2 = row + dr;
        if (c2 >= 0 && c2 < COLS && r2 >= 0 && r2 < ROWS) {
          if (pixelGrid[c2][r2] === GOLD_COLOR) goldUsed = Math.max(0, goldUsed - 1);
          pixelGrid[c2][r2] = null;
          // Effacer ce pixel avec la vraie couleur de fond
          ctx.fillStyle = BG_COLOR;
          ctx.fillRect(c2 * PX, r2 * PX, PX, PX);
          ctx.strokeStyle = 'rgba(255,255,255,0.06)';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(c2 * PX, r2 * PX, PX, PX);
        }
      }
    }
    updateGoldCounter();

  } else {
    // Dessin
    if (color === GOLD_COLOR) {
      if (goldUsed >= MAX_GOLD) { showToast("RÉSERVE D'OR ÉPUISÉE !"); return; }
      if (pixelGrid[col][row] !== GOLD_COLOR) goldUsed++;
    } else {
      if (pixelGrid[col][row] === GOLD_COLOR) goldUsed = Math.max(0, goldUsed - 1);
    }
    pixelGrid[col][row] = color;
    paintPixelOnCanvas(col, row, color);
    updateGoldCounter();
  }
  saveBackup();
}

// ══════════════════════════════════════════════
//  EVENTS SOURIS
// ══════════════════════════════════════════════
canvas.addEventListener('mousedown', e => {
  isDown = true;
  handleDraw(e.clientX, e.clientY);
});
window.addEventListener('mousemove', e => {
  if (!isDown) return;
  handleDraw(e.clientX, e.clientY);
});
window.addEventListener('mouseup', () => { isDown = false; });

// Coords en temps réel (sans dessin)
canvas.addEventListener('mousemove', e => {
  const { col, row } = getCanvasPos(e.clientX, e.clientY);
  document.getElementById('valX').textContent = Math.max(0, Math.min(col, COLS - 1));
  document.getElementById('valY').textContent = Math.max(0, Math.min(row, ROWS - 1));
});

// ══════════════════════════════════════════════
//  EVENTS TACTILES
// ══════════════════════════════════════════════
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    isDown = true;
    handleDraw(e.touches[0].clientX, e.touches[0].clientY);
  } else if (e.touches.length === 2) {
    // Pinch start
    isDown = false;
    pinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    pinchScaleStart = currentScale;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDown) {
    handleDraw(e.touches[0].clientX, e.touches[0].clientY);
    const { col, row } = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
    document.getElementById('valX').textContent = Math.max(0, Math.min(col, COLS - 1));
    document.getElementById('valY').textContent = Math.max(0, Math.min(row, ROWS - 1));
  } else if (e.touches.length === 2 && pinchDist !== null) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    currentScale = Math.max(0.2, Math.min(5, pinchScaleStart * (dist / pinchDist)));
    applyTransform();
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinchDist = null;
  if (e.touches.length === 0) isDown = false;
}, { passive: false });

// ══════════════════════════════════════════════
//  SAUVEGARDE LOCALE
// ══════════════════════════════════════════════
function saveBackup() {
  try {
    localStorage.setItem('gp_grid_v3', JSON.stringify(pixelGrid));
    localStorage.setItem('gp_gold_v3', goldUsed.toString());
  } catch(e) {}
}

function loadBackup() {
  try {
    const saved = localStorage.getItem('gp_grid_v3');
    const savedGold = localStorage.getItem('gp_gold_v3');
    if (saved) {
      pixelGrid = JSON.parse(saved);
      goldUsed = savedGold ? parseInt(savedGold) : 0;
      redrawAll();
      updateGoldCounter();
    }
  } catch(e) {}
}

// ══════════════════════════════════════════════
//  MODAL & PUBLICATION
// ══════════════════════════════════════════════
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('p-name').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

async function publish() {
  const name = document.getElementById('p-name').value.trim();
  const title = document.getElementById('p-title').value.trim();
  if (!name || !title) { showToast("REMPLIS TON PSEUDO ET LE TITRE !"); return; }

  const img = canvas.toDataURL('image/png');
  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, title, img })
    });
    if (res.ok) {
      closeModal();
      showToast("✦ PUBLIÉ AVEC SUCCÈS !");
      loadGallery();
      loadTop10();
    } else {
      const errData = await res.json().catch(() => ({}));
      showToast("ERREUR SERVEUR : " + (errData.error || res.status));
    }
  } catch (e) {
    showToast("SERVEUR INJOIGNABLE — VÉRIFIE QUE RENDER EST ACTIF");
  }
}

// ══════════════════════════════════════════════
//  GALERIE
// ══════════════════════════════════════════════
async function loadGallery() {
  const gal = document.getElementById('gallery');
  try {
    const res = await fetch('/api/gallery');
    const data = await res.json();
    if (!data.length) {
      gal.innerHTML = '<div class="gallery-loading">AUCUNE CRÉATION POUR L\'INSTANT</div>';
      return;
    }
    gal.innerHTML = data.map(art => `
      <div class="art-card">
        <div class="art-card-header">
          <div class="art-card-title">${escHtml(art.title)}</div>
          <div class="art-card-author">par @${escHtml(art.name)}</div>
        </div>
        <img src="${art.img}" alt="${escHtml(art.title)}" loading="lazy">
        <div class="art-card-footer">
          <span class="art-date">${formatDate(art.createdAt)}</span>
          <button class="btn-vote" onclick="vote('${art.id}', this)">⭐ ${art.votes}</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    gal.innerHTML = '<div class="gallery-loading">ERREUR DE CHARGEMENT</div>';
  }
}

// ══════════════════════════════════════════════
//  TOP 10
// ══════════════════════════════════════════════
const RANK_MEDALS = ['🥇', '🥈', '🥉'];

async function loadTop10() {
  const list = document.getElementById('top10-list');
  try {
    const res = await fetch('/api/top10');
    const data = await res.json();
    if (!data.length) {
      list.innerHTML = '<div class="gallery-loading">AUCUNE ŒUVRE ENCORE</div>';
      return;
    }
    list.innerHTML = data.map((art, i) => {
      const rankClass = i < 3 ? `rank-${i + 1}` : 'rank-other';
      const badge = i < 3 ? RANK_MEDALS[i] : `#${i + 1}`;
      return `
        <div class="top-card ${rankClass}">
          <div class="rank-badge">${badge}</div>
          <img class="top-thumb" src="${art.img}" alt="${escHtml(art.title)}">
          <div class="top-info">
            <div class="top-title">${escHtml(art.title)}</div>
            <div class="top-author">@${escHtml(art.name)}</div>
          </div>
          <div class="top-votes">⭐ ${art.votes}</div>
        </div>
      `;
    }).join('');
  } catch (e) {
    list.innerHTML = '<div class="gallery-loading">ERREUR DE CHARGEMENT</div>';
  }
}

// ══════════════════════════════════════════════
//  VOTE
// ══════════════════════════════════════════════
async function vote(id, btn) {
  try {
    btn.classList.add('voted');
    btn.disabled = true;
    const res = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    });
    const data = await res.json();
    btn.textContent = `⭐ ${data.votes}`;
    loadTop10();
  } catch (e) {
    btn.classList.remove('voted');
    btn.disabled = false;
  }
}

// ══════════════════════════════════════════════
//  UTILITAIRES
// ══════════════════════════════════════════════
function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
drawBase();
loadBackup();
window.addEventListener('resize', resetView);
resetView();
loadGallery();
loadTop10();
</script>
</body>
</html>
