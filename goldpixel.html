<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GOLD PIXEL — Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:   #ffaa00;
      --gold2:  #ffe066;
      --bg:     #050b14;
      --bg1:    #081422;
      --bg2:    #0d1e36;
      --bg3:    #122440;
      --cy:     #00f3ff;
      --red:    #ff3131;
      --border: rgba(255,170,0,.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      overflow-x: hidden; touch-action: none; -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.045) 2px, rgba(0,0,0,.045) 4px);
    }
    .header { width: 100%; padding: 18px 0 10px; text-align: center; position: relative; z-index: 2; }
    .site-title { font-family: 'Orbitron', monospace; font-size: 1.4rem; font-weight: 900; color: var(--gold); letter-spacing: 3px; text-shadow: 0 0 18px var(--gold); }
    .site-sub { font-family: 'Share Tech Mono', monospace; font-size: .58rem; color: rgba(255,255,255,.35); letter-spacing: 3px; margin-top: 4px; }
    .format-bar { display: flex; gap: 8px; margin: 10px 0 12px; position: relative; z-index: 2; }
    .btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); font-family: 'Orbitron'; padding: 7px 14px; font-size: .58rem; cursor: pointer; border-radius: 4px; }
    .btn.active { background: var(--gold); color: #000; box-shadow: 0 0 14px rgba(255,170,0,.4); }
    #viewport { position: relative; z-index: 2; border: 2px solid var(--gold); border-radius: 8px; overflow: hidden; background: #000; box-shadow: 0 0 30px rgba(255,170,0,.2); touch-action: none; cursor: crosshair; }
    #canvas-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; image-rendering: pixelated; }
    #main-canvas { display: block; background: #081422; }
    #grid-overlay { position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(to right, rgba(255,255,255,.055) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,.055) 1px, transparent 1px); }
    .ui { width: 100%; max-width: 560px; padding: 14px 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; position: relative; z-index: 2; }
    .gold-box { display: flex; align-items: center; gap: 12px; background: rgba(255,170,0,.07); padding: 9px 18px; border-radius: 8px; border: 1px solid var(--gold); width: 100%; justify-content: center; }
    .gold-swatch { width: 32px; height: 32px; background: radial-gradient(circle at 35% 35%, var(--gold2), var(--gold)); border: 2px solid rgba(255,255,255,.5); border-radius: 5px; cursor: pointer; position: relative; }
    .gold-swatch.active { border-color: #fff; transform: scale(1.15); box-shadow: 0 0 18px var(--gold); }
    .gold-swatch.active::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; }
    .gold-bar-bg { height: 5px; background: rgba(255,170,0,.15); border-radius: 100px; overflow: hidden; width: 100px; }
    .gold-bar-fill { height: 100%; background: var(--gold); width: 0%; transition: width .3s; }
    .palette { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; width: 100%; }
    .c-btn { aspect-ratio: 1; border-radius: 3px; cursor: pointer; border: 1px solid rgba(255,255,255,.15); }
    .c-btn.active { border: 2px solid #fff; transform: scale(1.1); box-shadow: 0 0 10px #fff; }
    .btn-publish { width: 100%; padding: 13px; background: var(--gold); color: #000; font-family: 'Orbitron'; font-weight: 700; border: none; border-radius: 4px; cursor: pointer; }
    #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; width: 90%; max-width: 560px; margin-top: 20px; padding-bottom: 50px; }
    .art-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 9px; }
    .art-card img { width: 100%; image-rendering: pixelated; border-radius: 3px; }
    .art-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 0.6rem; color: var(--gold); font-family: 'Orbitron'; }
    .btn-vote { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 2px 6px; border-radius: 4px; cursor: pointer; }
    .btn-vote.voted { background: var(--gold); color: #000; }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 4px; opacity: 0; transition: 0.3s; z-index: 1000; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="header">
  <div class="site-title">GOLD PIXEL STUDIO</div>
  <div class="site-sub">CRÉEZ · PUBLIEZ · VOTEZ</div>
</div>
<div class="format-bar">
  <button id="fmt11" class="btn active" onclick="changeFormat(600,600,'1:1')">FORMAT 1:1</button>
  <button id="fmt169" class="btn" onclick="changeFormat(800,450,'16:9')">FORMAT 16:9</button>
</div>
<div id="viewport">
  <div id="canvas-container">
    <canvas id="main-canvas" width="600" height="600"></canvas>
    <div id="grid-overlay"></div>
  </div>
</div>
<div class="ui">
  <div class="tool-bar">
    <button id="btn-draw" class="btn active" onclick="setMode('draw')">✏ PIXEL</button>
    <button id="btn-erase" class="btn" onclick="setMode('erase')">◻ GOMME</button>
    <button id="btn-move" class="btn" onclick="setMode('move')">✥ DÉPLACER</button>
    <button class="btn" onclick="resetView()">⊙ RECENTRER</button>
  </div>
  <div class="gold-box">
    <div id="gold-swatch" class="gold-swatch" onclick="selectGold()"></div>
    <div style="font-family:Orbitron; font-size:.65rem; color:var(--gold)">OR : <span id="goldCount">0</span>/30</div>
    <div class="gold-bar-bg"><div class="gold-bar-fill" id="goldBar"></div></div>
  </div>
  <div class="palette" id="palette"></div>
  <button class="btn-publish" id="publishBtn" onclick="saveArt()">▲ PUBLIER DANS LA GALERIE</button>
</div>
<div id="gallery"></div>
<div id="toast"></div>

<script>
const COLORS = ["#FFFFFF","#CCCCCC","#888888","#444444","#222222","#111111","#050b14","#000000","#C8E8FF","#7AB8F0","#00AAFF","#0066CC","#003880","#001840","#00f3ff","#006688","#CCFFCC","#88FF88","#22DD44","#009922","#005511","#003308","#CCFF00","#66BB00","#FFEECC","#FFBB66","#FF8800","#FF4400","#CC0000","#880000","#FF66CC","#CC0066"];
const canvas = document.getElementById('main-canvas'), ctx = canvas.getContext('2d'), container = document.getElementById('canvas-container'), grid = document.getElementById('grid-overlay'), viewport = document.getElementById('viewport');
const PIXEL = 15, GOLD_MAX = 30, GOLD_HEX = '#ffaa00';
let cW = 600, cH = 600, scale = 1, pos = { x: 0, y: 0 }, mode = 'draw', color = '#5A7A94', isDown = false, goldPixels = 0;
let myUploads = JSON.parse(localStorage.getItem('gp_uploads') || '[]'), myVotes = JSON.parse(localStorage.getItem('gp_votes') || '[]');

const pal = document.getElementById('palette');
COLORS.forEach(c => {
  const b = document.createElement('div'); b.className = 'c-btn'; b.style.background = c;
  b.onclick = () => { color = c; setMode('draw'); document.querySelectorAll('.c-btn, .gold-swatch').forEach(x => x.classList.remove('active')); b.classList.add('active'); };
  pal.appendChild(b);
});

function selectGold() { color = GOLD_HEX; setMode('draw'); document.querySelectorAll('.c-btn').forEach(x => x.classList.remove('active')); document.getElementById('gold-swatch').classList.add('active'); }
function updateGoldUI() { document.getElementById('goldCount').textContent = goldPixels; document.getElementById('goldBar').style.width = (goldPixels/GOLD_MAX*100)+'%'; }
function updateTransform() { container.style.transform = `translate(${pos.x}px,${pos.y}px) scale(${scale})`; }
function resetView() { const vw = viewport.clientWidth; scale = vw / cW; pos = { x: 0, y: 0 }; updateTransform(); }

function changeFormat(w, h, label) {
  const tmp = document.createElement('canvas'); tmp.width = canvas.width; tmp.height = canvas.height;
  tmp.getContext('2d').drawImage(canvas, 0, 0);
  cW = w; cH = h; canvas.width = w; canvas.height = h;
  ctx.fillStyle = '#081422'; ctx.fillRect(0, 0, w, h);
  ctx.drawImage(tmp, Math.round((w-tmp.width)/2), Math.round((h-tmp.height)/2));
  document.querySelectorAll('.format-bar .btn').forEach(b => b.classList.remove('active'));
  document.getElementById(label === '1:1' ? 'fmt11' : 'fmt169').classList.add('active');
  grid.style.backgroundSize = `${PIXEL}px ${PIXEL}px`;
  sizeViewport(); resetView();
}

function sizeViewport() { const vw = Math.min(window.innerWidth * 0.95, 560); viewport.style.width = vw + 'px'; viewport.style.height = (vw * (cH/cW)) + 'px'; }

function paint(e) {
  if(!isDown || mode === 'move') return;
  const rect = canvas.getBoundingClientRect();
  const ev = e.touches ? e.touches[0] : e;
  const x = Math.floor((ev.clientX - rect.left) / (PIXEL * scale)) * PIXEL;
  const y = Math.floor((ev.clientY - rect.top) / (PIXEL * scale)) * PIXEL;
  if (x < 0 || x >= cW || y < 0 || y >= cH) return;
  
  const d = ctx.getImageData(x+1, y+1, 1, 1).data;
  const wasGold = (d[0] === 255 && d[1] === 170 && d[2] === 0);

  if (mode === 'erase') {
    if(wasGold) goldPixels--;
    ctx.fillStyle = '#081422'; ctx.fillRect(x, y, PIXEL, PIXEL);
  } else {
    if(color === GOLD_HEX && goldPixels >= GOLD_MAX && !wasGold) return;
    if(color === GOLD_HEX && !wasGold) goldPixels++;
    if(color !== GOLD_HEX && wasGold) goldPixels--;
    ctx.fillStyle = color; ctx.fillRect(x, y, PIXEL, PIXEL);
  }
  updateGoldUI();
}

viewport.onmousedown = (e) => { isDown = true; paint(e); };
window.onmousemove = (e) => { if(isDown && mode === 'move') { pos.x += e.movementX; pos.y += e.movementY; updateTransform(); } else paint(e); };
window.onmouseup = () => isDown = false;

function setMode(m) { mode = m; viewport.className = 'mode-'+m; document.getElementById('btn-draw').classList.toggle('active', m==='draw'); document.getElementById('btn-erase').classList.toggle('active', m==='erase'); document.getElementById('btn-move').classList.toggle('active', m==='move'); }

async function loadGallery() {
  const gal = document.getElementById('gallery');
  const res = await fetch('/api/gallery?t='+Date.now());
  const data = await res.json();
  gal.innerHTML = '';
  [...data].reverse().forEach(art => {
    const card = document.createElement('div'); card.className = 'art-card';
    const isMine = myUploads.includes(art.id);
    card.innerHTML = `<img src="${art.img}"><div class="art-card-footer"><span>@${art.name}</span><div><button class="btn-vote ${myVotes.includes(art.id)?'voted':''}" onclick="vote('${art.id}', this)">★ ${art.votes}</button>${isMine?`<button onclick="deleteArt('${art.id}')" style="background:none; border:none; color:red; margin-left:10px; cursor:pointer;">✕</button>`:''}</div></div>`;
    gal.appendChild(card);
  });
}

async function saveArt() {
  const name = prompt('Pseudo :'); if(!name) return;
  const img = canvas.toDataURL('image/jpeg', 0.8);
  const res = await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, img }) });
  if(res.ok) { const data = await res.json(); myUploads.push(data.id); localStorage.setItem('gp_uploads', JSON.stringify(myUploads)); loadGallery(); toast("Publié !"); }
}

async function vote(id, btn) {
  if(myVotes.includes(id)) return;
  const res = await fetch('/api/vote', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id }) });
  if(res.ok) { myVotes.push(id); localStorage.setItem('gp_votes', JSON.stringify(myVotes)); loadGallery(); }
}

async function deleteArt(id) {
  if(!confirm('Supprimer ?')) return;
  await fetch('/api/delete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id }) });
  loadGallery();
}

function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.className = 'show'; setTimeout(() => t.className = '', 2000); }

ctx.fillStyle = '#081422'; ctx.fillRect(0,0,600,600);
sizeViewport(); resetView(); loadGallery();
</script>
</body>
</html>
