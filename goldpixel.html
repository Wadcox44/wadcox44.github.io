<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GOLD PIXEL — Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #ffaa00; --gold2: #ffe066; --bg: #050b14; --bg2: #0d1e36; --cy: #00f3ff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: #fff; font-family: 'Rajdhani'; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; touch-action: none; }
    
    /* Animation Brillance Deluxe */
    @keyframes gold-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes gold-pulse { 0% { box-shadow: 0 0 10px rgba(255,170,0,0.4); border-color: var(--gold); } 50% { box-shadow: 0 0 25px rgba(255,170,0,0.8); border-color: #fff; } 100% { box-shadow: 0 0 10px rgba(255,170,0,0.4); border-color: var(--gold); } }

    .header { width: 100%; padding: 20px 0; text-align: center; }
    .site-title { font-family: 'Orbitron'; font-size: 1.6rem; color: var(--gold); text-shadow: 0 0 20px var(--gold); letter-spacing: 4px; font-weight: 900; }
    
    #viewport { position: relative; border: 3px solid var(--gold); border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
    #canvas-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; image-rendering: pixelated; }
    #main-canvas { display: block; background: #081422; }
    #grid-overlay { position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(to right, rgba(255,255,255,.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,.05) 1px, transparent 1px); }

    .ui { width: 100%; max-width: 600px; padding: 20px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
    
    .gold-section { 
        display: flex; align-items: center; gap: 20px; background: linear-gradient(90deg, rgba(255,170,0,0.1), rgba(0,0,0,0.4)); 
        padding: 15px 25px; border-radius: 15px; border: 2px solid var(--gold); width: 100%;
        animation: gold-pulse 3s infinite;
    }
    .gold-swatch { 
        width: 55px; height: 55px; /* Encore plus imposant */
        background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        background-size: 200% 200%;
        animation: gold-shimmer 4s linear infinite;
        border: 2px solid #fff; border-radius: 10px; cursor: pointer; position: relative;
        box-shadow: 0 0 15px var(--gold);
    }
    .gold-swatch.active::after { content: '👑'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    
    .palette { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; width: 100%; }
    .c-btn { aspect-ratio: 1; border-radius: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
    .c-btn.active { border: 2px solid #fff; transform: scale(1.15); box-shadow: 0 0 15px #fff; z-index: 10; }
    
    .btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); font-family: 'Orbitron'; padding: 10px 18px; font-size: .65rem; cursor: pointer; border-radius: 6px; transition: 0.3s; }
    .btn.active { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }
    .btn-publish { width: 100%; padding: 18px; background: var(--gold); color: #000; font-family: 'Orbitron'; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; letter-spacing: 1px; }

    #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; width: 95%; margin-top: 30px; padding-bottom: 50px; }
    .art-card { background: var(--bg2); border: 1px solid rgba(255,170,0,0.3); padding: 12px; border-radius: 10px; transition: 0.3s; }
    .art-card:hover { transform: translateY(-5px); border-color: var(--gold); }
    .art-card img { width: 100%; image-rendering: pixelated; border-radius: 5px; border: 1px solid #000; }
  </style>
</head>
<body>
<div class="header">
  <div class="site-title">GOLD PIXEL STUDIO</div>
</div>

<div id="viewport">
  <div id="canvas-container">
    <canvas id="main-canvas" width="800" height="450"></canvas>
    <div id="grid-overlay"></div>
  </div>
</div>

<div class="ui">
  <div class="tool-bar">
    <button id="btn-draw" class="btn active" onclick="setMode('draw')">✏ PIXEL</button>
    <button id="btn-erase" class="btn" onclick="setMode('erase')">◻ GOMME</button>
    <button id="btn-move" class="btn" onclick="setMode('move')">✥ DÉPLACER</button>
    <button class="btn" onclick="resetView()">⊙ RECENTRER</button>
  </div>

  <div class="gold-section">
    <div id="gold-swatch" class="gold-swatch" onclick="selectGold()"></div>
    <div style="font-family:Orbitron; font-size:.8rem; color:var(--gold); font-weight:900;">RÉSERVE D'OR : <span id="goldCount">0</span> / 50</div>
  </div>

  <div class="palette" id="palette"></div>
  <button class="btn-publish" id="publishBtn" onclick="saveArt()">▲ PUBLIER DANS LA GALERIE</button>
</div>

<div id="gallery"></div>

<script>
// Palette 36 couleurs incluant Chair, Terre, Gris et Énergie
const COLORS = ["#FFFFFF","#CCCCCC","#888888","#444444","#222222","#111111","#050b14","#000000","#C8E8FF","#7AB8F0","#00AAFF","#0066CC","#003880","#1A2533","#00f3ff","#006688","#CCFFCC","#88FF88","#22DD44","#009922","#005511","#003308","#CCFF00","#66BB00","#FFDBAC","#F1C27D","#E0AC69","#8D5524","#633919","#FFEECC","#FF8800","#CC0000","#FF3131","#FF66CC","#F7FE2E","#8C52FF"];

const canvas = document.getElementById('main-canvas'), ctx = canvas.getContext('2d'), container = document.getElementById('canvas-container'), grid = document.getElementById('grid-overlay'), viewport = document.getElementById('viewport');
const PIXEL = 15, GOLD_MAX = 50, GOLD_HEX = '#ffaa00';
let cW = 800, cH = 450, scale = 1, pos = { x: 0, y: 0 }, mode = 'draw', color = '#FFFFFF', isDown = false, goldPixels = 0;
let myUploads = JSON.parse(localStorage.getItem('gp_uploads') || '[]'), myVotes = JSON.parse(localStorage.getItem('gp_votes') || '[]');

const pal = document.getElementById('palette');
COLORS.forEach(c => {
  const b = document.createElement('div'); b.className = 'c-btn'; b.style.background = c;
  b.onclick = () => { color = c; setMode('draw'); document.querySelectorAll('.c-btn, .gold-swatch').forEach(x => x.classList.remove('active')); b.classList.add('active'); };
  pal.appendChild(b);
});

function selectGold() { color = GOLD_HEX; setMode('draw'); document.querySelectorAll('.c-btn').forEach(x => x.classList.remove('active')); document.getElementById('gold-swatch').classList.add('active'); }
function updateGoldUI() { document.getElementById('goldCount').textContent = goldPixels; }
function updateTransform() { container.style.transform = `translate(${pos.x}px,${pos.y}px) scale(${scale})`; }
function resetView() { const vw = Math.min(window.innerWidth * 0.95, 600); scale = vw / cW; pos = { x: 0, y: 0 }; updateTransform(); }

function paint(e) {
  if(!isDown || mode === 'move') return;
  const rect = canvas.getBoundingClientRect();
  const ev = e.touches ? e.touches[0] : e;
  const x = Math.floor((ev.clientX - rect.left) / (PIXEL * scale)) * PIXEL;
  const y = Math.floor((ev.clientY - rect.top) / (PIXEL * scale)) * PIXEL;
  if (x < 0 || x >= cW || y < 0 || y >= cH) return;
  const d = ctx.getImageData(x+1, y+1, 1, 1).data;
  const wasGold = (d[0] === 255 && d[1] === 170 && d[2] === 0);
  if (mode === 'erase') { if(wasGold) goldPixels--; ctx.fillStyle = '#081422'; ctx.fillRect(x, y, PIXEL, PIXEL); }
  else {
    if(color === GOLD_HEX && goldPixels >= GOLD_MAX && !wasGold) return;
    if(color === GOLD_HEX && !wasGold) goldPixels++;
    if(color !== GOLD_HEX && wasGold) goldPixels--;
    ctx.fillStyle = color; ctx.fillRect(x, y, PIXEL, PIXEL);
  }
  updateGoldUI();
}

viewport.onmousedown = (e) => { isDown = true; paint(e); };
window.onmousemove = (e) => { if(isDown && mode === 'move') { pos.x += e.movementX; pos.y += e.movementY; updateTransform(); } else paint(e); };
window.onmouseup = () => isDown = false;

function setMode(m) { mode = m; document.getElementById('btn-draw').classList.toggle('active', m==='draw'); document.getElementById('btn-erase').classList.toggle('active', m==='erase'); document.getElementById('btn-move').classList.toggle('active', m==='move'); }

async function loadGallery() {
  const gal = document.getElementById('gallery');
  const res = await fetch('/api/gallery?t='+Date.now());
  const data = await res.json();
  gal.innerHTML = '';
  [...data].reverse().forEach(art => {
    const card = document.createElement('div'); card.className = 'art-card';
    card.innerHTML = `<img src="${art.img}"><div style="color:var(--gold); font-size:.7rem; font-family:Orbitron; margin-top:8px;">@${art.name}</div>`;
    gal.appendChild(card);
  });
}

async function saveArt() {
  const name = prompt('Pseudo :'); if(!name) return;
  const img = canvas.toDataURL('image/jpeg', 0.85);
  const res = await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, img }) });
  if(res.ok) { loadGallery(); alert("Œuvre partagée avec succès ! ✨"); }
}

ctx.fillStyle = '#081422'; ctx.fillRect(0,0,cW,cH);
window.addEventListener('resize', resetView);
resetView(); loadGallery();
</script>
</body>
</html>
