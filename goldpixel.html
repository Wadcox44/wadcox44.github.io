<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD PIXEL - Game Area</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffaa00;
            --matte: #5A7A94;
            --bg: #050b14;
            --border-gold: rgba(255, 170, 0, 0.4);
            --glow-gold: 0 0 15px rgba(255, 170, 0, 0.2);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* --- LE CANEVAS --- */
        #canvas-container {
            position: relative;
            background: #081422; /* Fond sombre pour le canevas */
            border: 2px solid var(--gold); /* Contour doré */
            box-shadow: var(--glow-gold);
            padding: 5px;
            border-radius: 4px;
        }

        canvas {
            display: block;
            background: #081422;
            cursor: crosshair;
        }

        /* --- PALETTES DE COULEURS --- */
        .controls {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .palette {
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(0, 243, 255, 0.1);
        }

        .color-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .color-btn.active {
            border-color: #fff;
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .btn-matte { background-color: var(--matte); }
        .btn-gold { background-color: var(--gold); box-shadow: 0 0 10px var(--gold); }

        /* --- BOUTONS D'ACTION --- */
        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'Orbitron', sans-serif;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.7rem;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 15px var(--gold);
        }

        /* --- GALERIE --- */
        #gallery {
            margin-top: 40px;
            width: 100%;
