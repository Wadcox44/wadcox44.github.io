<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GOLD PIXEL — Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #ffaa00; --bg: #050b14; --bg2: #0d1e36; }
    body { background: var(--bg); color: #fff; font-family: 'Rajdhani'; display: flex; flex-direction: column; align-items: center; margin: 0; }
    .header { padding: 20px; text-align: center; }
    .site-title { font-family: 'Orbitron'; font-size: 1.6rem; color: var(--gold); text-shadow: 0 0 10px var(--gold); letter-spacing: 2px; }
    #viewport { width: 90vw; max-width: 800px; aspect-ratio: 16/9; border: 2px solid var(--gold); background: #000; position: relative; overflow: hidden; }
    #main-canvas { width: 800px; height: 450px; image-rendering: pixelated; display: block; }
    .ui { width: 90vw; max-width: 600px; margin-top: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px; }
    .palette { display: grid; grid-template-columns: repeat(9, 1fr); gap: 5px; }
    .c-btn { aspect-ratio: 1; border-radius: 4px; cursor: pointer; border: 1px solid #333; }
    .c-btn.active { border: 2px solid #fff; transform: scale(1.1); }
    .btn-publish { background: var(--gold); color: #000; border: none; padding: 15px; font-family: 'Orbitron'; font-weight: 900; border-radius: 5px; cursor: pointer; }
    #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; width: 90vw; margin-top: 30px; }
    .art-card { background: var(--bg2); border: 1px solid #333; border-radius: 8px; overflow: hidden; }
    .art-card img { width: 100%; image-rendering: pixelated; }
    .art-info { padding: 10px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="header"><div class="site-title">GOLD PIXEL STUDIO</div></div>
  <div id="viewport"><canvas id="main-canvas" width="800" height="450"></canvas></div>
  <div class="ui">
    <div class="palette" id="palette"></div>
    <button class="btn-publish" onclick="publish()">▲ PUBLIER DANS LE CLOUD</button>
    <div id="gallery"></div>
  </div>

  <script>
    const COLORS = ["#FFFFFF","#CCCCCC","#888888","#444444","#222222","#111111","#000000","#00AAFF","#003880","#22DD44","#005511","#FF3131","#FF8800","#ffaa00","#8C52FF"];
    const canvas = document.getElementById('main-canvas'), ctx = canvas.getContext('2d');
    let color = "#FFFFFF", isDown = false;

    COLORS.forEach(c => {
      const b = document.createElement('div'); b.className = 'c-btn'; b.style.backgroundColor = c;
      b.onclick = () => { color = c; };
      document.getElementById('palette').appendChild(b);
    });

    canvas.onmousedown = () => isDown = true;
    window.onmouseup = () => isDown = false;
    canvas.onmousemove = (e) => {
      if(!isDown) return;
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / (rect.width / 800) / 15) * 15;
      const y = Math.floor((e.clientY - rect.top) / (rect.height / 450) / 15) * 15;
      ctx.fillStyle = color; ctx.fillRect(x, y, 15, 15);
      localStorage.setItem('gp_save', canvas.toDataURL());
    };

    async function publish() {
      const name = prompt("Ton pseudo ?");
      const title = prompt("Titre de l'œuvre ?");
      const img = canvas.toDataURL('image/jpeg', 0.8);
      const res = await fetch('/api/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name, title, img })
      });
      if(res.ok) { alert("Publié !"); loadGallery(); }
    }

    async function loadGallery() {
      const res = await fetch('/api/gallery');
      const data = await res.json();
      const gal = document.getElementById('gallery');
      gal.innerHTML = data.map(art => `
        <div class="art-card">
          <img src="${art.img}">
          <div class="art-info"><b>${art.title}</b> par @${art.name}</div>
        </div>
      `).join('');
    }

    const saved = localStorage.getItem('gp_save');
    if(saved) { const i = new Image(); i.onload = () => ctx.drawImage(i,0,0); i.src = saved; }
    else { ctx.fillStyle = '#081422'; ctx.fillRect(0,0,800,450); }
    loadGallery();
  </script>
</body>
</html>
