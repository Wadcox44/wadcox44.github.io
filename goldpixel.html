<style>
    /* Ajouts styles pour les votes et la galerie */
    .art-card { position: relative; background: #0d1e36; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,170,0,0.2); }
    
    .vote-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    
    .vote-btn { background: rgba(255,170,0,0.1); border: 1px solid var(--gold); color: var(--gold); cursor: pointer; border-radius: 4px; padding: 2px 8px; font-family: 'Orbitron'; font-size: 0.7rem; transition: 0.3s; }
    .vote-btn:hover { background: var(--gold); color: #000; }

    .del-btn { position: absolute; top: -8px; right: -8px; background: #ff3131; color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-weight: bold; display: none; z-index: 5; }
</style>

<div id="gallery"></div>

<script>
    // Note : Stockage local pour savoir quelles œuvres nous appartiennent
    let myWorks = JSON.parse(localStorage.getItem('goldPixel_myWorks') || "[]");

    async function loadGallery() {
        const res = await fetch('/api/gallery');
        const data = await res.json();
        const gal = document.getElementById("gallery");
        gal.innerHTML = "";

        data.reverse().forEach(art => {
            // On vérifie si l'œuvre est à nous
            const isMine = myWorks.includes(art.id);
            
            gal.innerHTML += `
                <div class="art-card">
                    ${isMine ? `<button class="del-btn" style="display:block" onclick="deleteArt('${art.id}')">X</button>` : ''}
                    <img src="${art.img}">
                    <div class="vote-bar">
                        <span style="font-size:0.7rem; color:var(--gold)">@${art.name}</span>
                        <button class="vote-btn" onclick="vote('${art.id}')">👍 ${art.votes}</button>
                    </div>
                </div>`;
        });
    }

    async function saveArt() {
        const name = prompt("Pseudo du Pionnier :");
        if(!name) return;
        
        const response = await fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, img: canvas.toDataURL() })
        });
        
        const result = await response.json();
        // On enregistre l'ID dans notre navigateur
        myWorks.push(result.id);
        localStorage.setItem('goldPixel_myWorks', JSON.stringify(myWorks));
        
        loadGallery();
    }

    async function vote(id) {
        // Optionnel : On pourrait limiter à 1 vote par personne ici aussi
        await fetch('/api/vote', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id })
        });
        loadGallery();
    }

    async function deleteArt(id) {
        if(!confirm("Supprimer votre œuvre ?")) return;
        await fetch('/api/delete', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id })
        });
        // Retirer de notre liste locale
        myWorks = myWorks.filter(item => item !== id);
        localStorage.setItem('goldPixel_myWorks', JSON.stringify(myWorks));
        loadGallery();
    }

    // ... (Reste du code canvas initCanvas etc.) ...
    window.onload = loadGallery;
</script>
