<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD PIXEL - Game Area</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffaa00;
            --bg: #050b14;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
            margin: 10px 0;
            font-size: 1.8rem;
        }

        #canvas-container {
            background: #081422;
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.2);
            padding: 5px;
            border-radius: 4px;
            max-width: 95vw;
        }

        canvas {
            display: block;
            background: #081422;
            cursor: crosshair;
            touch-action: none;
        }

        /* --- NOUVELLE GRILLE DE COULEURS --- */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr); /* 10 colonnes pour 20+ couleurs */
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid rgba(255, 170, 0, 0.2);
        }

        .color-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px; /* Carré pour un look plus technique */
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn:hover { transform: scale(1.15); z-index: 2; }
        .color-btn.active {
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transform: scale(1.2);
        }

        .actions { display: flex; gap: 10px; margin-bottom: 30px; }
        .btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: 'Orbitron', sans-serif;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 4px;
        }
        .btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        #gallery {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .art-card { background: #0d1e36; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,170,0,0.1); }
        .art-card img { width: 100%; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>GOLD PIXEL</h1>

    <div id="canvas-container">
        <canvas id="canvas" width="500" height="350"></canvas>
    </div>

    <div class="palette-grid" id="palette"></div>

    <div class="actions">
        <button class="btn" onclick="saveArt()">SAUVEGARDER (1 Pi)</button>
        <button class="btn" onclick="clearCanvas()" style="border-color:#444; color:#888;">EFFACER</button>
    </div>

    <div style="font-family:'Orbitron'; margin-bottom:20px;">GALERIE DES SAISONS</div>
    <div id="gallery"></div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const paletteEl = document.getElementById("palette");
        let currentColor = "#5A7A94";

        // --- LISTE DES 20 COULEURS (MATTE, GOLD, ET PLUS) ---
        const colors = [
            "#5A7A94", "#ffaa00", "#FFD700", "#FFFFFF", "#000000",
            "#FF3131", "#FF5E3A", "#FF914D", "#FFBD59", "#CCFF00",
            "#22FF00", "#00D9FF", "#0088FF", "#5271FF", "#8C52FF",
            "#FF577F", "#FF66C4", "#CB6CE6", "#808080", "#333333"
        ];

        // Génération des boutons de couleurs
        colors.forEach(color => {
            const btn = document.createElement("div");
            btn.className = "color-btn";
            btn.style.backgroundColor = color;
            if(color === currentColor) btn.classList.add("active");
            btn.onclick = () => {
                currentColor = color;
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            paletteEl.appendChild(btn);
        });

        function initCanvas() {
            ctx.fillStyle = "#081422";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        initCanvas();

        let painting = false;
        function draw(e) {
            if (!painting) return;
            ctx.lineWidth = 10;
            ctx.lineCap = "round";
            ctx.strokeStyle = currentColor;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            ctx.lineTo(clientX - rect.left, clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(clientX - rect.left, clientY - rect.top);
        }

        canvas.addEventListener("mousedown", () => painting = true);
        canvas.addEventListener("mouseup", () => { painting = false; ctx.beginPath(); });
        canvas.addEventListener("mousemove", draw);
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); painting = true; draw(e.touches[0]); });
        canvas.addEventListener("touchend", () => { painting = false; ctx.beginPath(); });
        canvas.addEventListener("touchmove", (e) => { e.preventDefault(); draw(e.touches[0]); });

        function clearCanvas() { if(confirm("Effacer ?")) initCanvas(); }

        async function loadGallery() {
            const res = await fetch('/api/gallery');
            const data = await res.json();
            const gallery = document.getElementById("gallery");
            gallery.innerHTML = "";
            data.reverse().forEach(art => {
                gallery.innerHTML += `<div class="art-card"><img src="${art.img}"><div style="color:var(--gold); font-size:0.8rem; margin-top:5px;">@${art.name}</div></div>`;
            });
        }

        async function saveArt() {
            let name = prompt("Pseudo :");
            if(!name) return;
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, img: canvas.toDataURL() })
            });
            loadGallery();
        }
        window.onload = loadGallery;
    </script>
</body>
</html>
