<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD PIXEL - Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffaa00; --bg: #050b14; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; touch-action: none; overflow-x: hidden; }
        
        h1 { font-family: 'Orbitron', sans-serif; color: var(--gold); text-shadow: 0 0 10px var(--gold); margin: 15px 0; }

        /* CADRE DU JEU */
        #viewport {
            width: 95vw;
            height: 50vh;
            max-width: 600px;
            border: 2px solid var(--gold);
            background: #000;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        #canvas-container { position: absolute; transform-origin: 0 0; image-rendering: pixelated; }
        #grid-overlay { position: absolute; top: 0; left: 0; pointer-events: none; background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px); }
        canvas { background: #081422; display: block; }

        /* INTERFACE CLAIRE */
        .ui { width: 100%; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        
        .tool-bar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        
        .btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); font-family: 'Orbitron'; padding: 8px 12px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .btn.active { background: var(--gold); color: #000; box-shadow: 0 0 10px var(--gold); }

        /* L'OR EN RETRAIT */
        .gold-section { display: flex; align-items: center; gap: 10px; background: rgba(255,170,0,0.1); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--gold); }
        .gold-btn { width: 30px; height: 30px; background: var(--gold); border: 2px solid #fff; cursor: pointer; border-radius: 4px; box-shadow: 0 0 10px var(--gold); }
        .gold-btn.active { transform: scale(1.1); border-color: #fff; box-shadow: 0 0 20px var(--gold); }
        .gold-counter { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--gold); }

        /* PALETTE */
        .palette { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin-top: 5px; }
        .color-btn { width: 22px; height: 22px; border-radius: 2px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .color-btn.active { border: 2px solid #fff; transform: scale(1.1); }

        /* GALERIE */
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; width: 95%; margin-top: 20px; padding-bottom: 40px; }
        .art-card { background: #0d1e36; padding: 8px; border-radius: 4px; border: 1px solid rgba(255,170,0,0.1); position: relative; }
        .art-card img { width: 100%; border-radius: 2px; }
        .del-btn { position: absolute; top: -5px; right: -5px; background: #ff3131; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <h1>GOLD PIXEL STUDIO</h1>
    
    <div id="viewport">
        <div id="canvas-container">
            <canvas id="canvas" width="600" height="600"></canvas>
            <div id="grid-overlay"></div>
        </div>
    </div>

    <div class="ui">
        <div class="tool-bar">
            <button id="drawBtn" class="btn active" onclick="setMode('draw')">PIXEL</button>
            <button id="eraseBtn" class="btn" onclick="setMode('erase')">GOMME</button>
            <button id="moveBtn" class="btn" onclick="setMode('move')">PAN (DÉPLACER)</button>
            <button class="btn" onclick="resetZoom()">RECENTRER</button>
        </div>

        <div class="gold-section">
            <div id="goldBtn" class="gold-btn" onclick="selectGold()"></div>
            <div class="gold-counter">OR : <span id="goldCount">0</span> / 15</div>
        </div>

        <div class="palette" id="palette"></div>
        
        <button class="btn" onclick="saveArt()" style="background:var(--gold); color:#000; width: 200px; font-size: 0.9rem;">PUBLIER L'ŒUVRE</button>
    </div>

    <div id="gallery"></div>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const container = document.getElementById("canvas-container");
        const grid = document.getElementById("grid-overlay");
        const pSize = 15;
        let scale = 1, pos = { x: 0, y: 0 }, mode = 'draw', color = "#5A7A94", lastColor = "#5A7A94", isDown = false, goldPixels = 0;
        let myWorks = JSON.parse(localStorage.getItem('goldPixel_myWorks') || "[]");

        grid.style.width = grid.style.height = "600px";
        grid.style.backgroundSize = `${pSize}px ${pSize}px`;

        const colors = [
            "#050b14", "#333333", "#5A7A94", "#808080", "#AAAAAA", "#CCCCCC", "#EEEEEE", "#FFFFFF",
            "#4D3900", "#806000", "#B38600", "#E6AC00", "#FFD700", "#FFEA00", "#FFFF80", "#FFFFCC",
            "#440000", "#880000", "#FF3131", "#FF5E3A", "#FF914D", "#FFBD59", "#FF66C4", "#FFBDD4",
            "#003300", "#22FF00", "#CCFF00", "#00D9FF", "#0088FF", "#5271FF", "#8C52FF", "#CB6CE6"
        ];

        colors.forEach(c => {
            const b = document.createElement("div"); 
            b.className = "color-btn"; b.style.background = c;
            b.onclick = () => { 
                color = lastColor = c; setMode('draw'); 
                document.querySelectorAll('.color-btn, .gold-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
            };
            document.getElementById("palette").appendChild(b);
        });

        function selectGold() { 
            color = lastColor = "#ffaa00"; setMode('draw'); 
            document.querySelectorAll('.color-btn').forEach(x => x.classList.remove('active'));
            document.getElementById('goldBtn').classList.add('active');
        }

        function updateTransform() { container.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(${scale})`; }
        function resetZoom() { scale = 0.8; pos = {x: 10, y: 10}; updateTransform(); }

        function handleAction(e) {
            if(!isDown) return;
            const ev = e.touches ? e.touches[0] : e;
            const rect = canvas.getBoundingClientRect();
            if(mode === 'move') { pos.x += ev.movementX || 0; pos.y += ev.movementY || 0; updateTransform(); return; }
            const x = Math.floor((ev.clientX - rect.left) / (pSize * scale)) * pSize;
            const y = Math.floor((ev.clientY - rect.top) / (pSize * scale)) * pSize;

            const pixelData = ctx.getImageData(x + 1, y + 1, 1, 1).data;
            const isTargetGold = pixelData[0] === 255 && pixelData[1] === 170 && pixelData[2] === 0;

            if(mode === 'draw' && color === "#ffaa00" && goldPixels >= 15 && !isTargetGold) return;
            if(mode === 'erase' && isTargetGold) goldPixels--;
            if(mode === 'draw' && color === "#ffaa00" && !isTargetGold) goldPixels++;
            if(mode === 'draw' && color !== "#ffaa00" && isTargetGold) goldPixels--;

            ctx.fillStyle = mode === 'erase' ? "#081422" : color;
            ctx.fillRect(x, y, pSize, pSize);
            document.getElementById("goldCount").innerText = Math.max(0, goldPixels);
        }

        canvas.onmousedown = (e) => { isDown = true; handleAction(e); };
        window.onmousemove = handleAction; window.onmouseup = () => isDown = false;
        canvas.ontouchstart = (e) => { e.preventDefault(); isDown = true; handleAction(e); };
        canvas.ontouchmove = handleAction; canvas.ontouchend = () => isDown = false;

        function setMode(m) {
            mode = m;
            document.getElementById("drawBtn").classList.toggle("active", m === 'draw');
            document.getElementById("eraseBtn").classList.toggle("active", m === 'erase');
            document.getElementById("moveBtn").classList.toggle("active", m === 'move');
        }

        async function loadGallery() {
            const res = await fetch('/api/gallery');
            const data = await res.json();
            const gal = document.getElementById("gallery"); gal.innerHTML = "";
            data.reverse().forEach(art => {
                const isMine = myWorks.includes(art.id);
                gal.innerHTML += `<div class="art-card">
                    <button class="del-btn" style="display:${isMine?'block':'none'}" onclick="deleteArt('${art.id}')">X</button>
                    <img src="${art.img}">
                    <div style="display:flex; justify:space-between; align-items:center; margin-top:5px;">
                        <span style="font-size:0.7rem; color:var(--gold)">@${art.name}</span>
                        <button class="btn" style="padding:2px 5px; font-size:0.5rem" onclick="vote('${art.id}')">👍 ${art.votes || 0}</button>
                    </div>
                </div>`;
            });
        }

        async function saveArt() {
            const name = prompt("Pseudo :"); if(!name) return;
            const res = await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name, img: canvas.toDataURL()}) });
            const result = await res.json();
            myWorks.push(result.id);
            localStorage.setItem('goldPixel_myWorks', JSON.stringify(myWorks));
            loadGallery();
        }

        async function vote(id) { await fetch('/api/vote', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id}) }); loadGallery(); }
        async function deleteArt(id) { if(confirm("Supprimer ?")) { await fetch('/api/delete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id}) }); myWorks = myWorks.filter(i => i !== id); localStorage.setItem('goldPixel_myWorks', JSON.stringify(myWorks)); loadGallery(); } }

        ctx.fillStyle = "#081422"; ctx.fillRect(0,0,600,600);
        resetZoom(); loadGallery();
    </script>
</body>
</html>
