<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Pixel — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #ffaa00; --bg: #050b14; --bg2: #0a1628; --bg3: #0d1e36; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: var(--bg3); border: 2px solid var(--gold); border-radius: 14px;
      padding: 40px 32px; width: 90%; max-width: 380px; text-align: center;
      box-shadow: 0 0 60px rgba(255,170,0,0.1);
    }
    .login-title { font-family: 'Orbitron', monospace; color: var(--gold); font-size: 1.1rem; margin-bottom: 8px; }
    .login-sub { font-size: 0.8rem; color: rgba(255,255,255,0.3); margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 12px 16px; margin-bottom: 14px;
      background: #050b14; border: 1px solid rgba(255,170,0,0.3);
      color: #fff; font-family: 'Orbitron', monospace; font-size: 1rem;
      border-radius: 6px; outline: none; letter-spacing: 0.1em; text-align: center;
    }
    .login-box input:focus { border-color: var(--gold); }
    .btn-login {
      width: 100%; padding: 12px; background: var(--gold); color: #000;
      font-family: 'Orbitron', monospace; font-weight: 700; font-size: 0.85rem;
      border: none; border-radius: 6px; cursor: pointer; letter-spacing: 0.08em;
    }
    .btn-login:hover { background: #fcf6ba; }
    .login-error { color: #ff6666; font-family: 'Orbitron', monospace; font-size: 0.65rem; margin-top: 10px; min-height: 18px; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    .admin-header {
      background: var(--bg2); border-bottom: 1px solid rgba(255,170,0,0.2);
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .admin-logo { font-family: 'Orbitron', monospace; color: var(--gold); font-size: 1rem; letter-spacing: 0.1em; }
    .admin-logo span { color: rgba(255,255,255,0.4); font-size: 0.7rem; margin-left: 10px; }

    .stats-bar {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .stat-chip {
      background: rgba(255,170,0,0.08); border: 1px solid rgba(255,170,0,0.2);
      border-radius: 6px; padding: 6px 14px; text-align: center;
    }
    .stat-chip .val { font-family: 'Orbitron', monospace; font-size: 1.1rem; color: var(--gold); display: block; }
    .stat-chip .lbl { font-size: 0.65rem; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; }
    .stat-chip.alert .val { color: #ff6666; }

    .btn-logout {
      background: transparent; border: 1px solid rgba(255,100,100,0.4); color: rgba(255,100,100,0.7);
      font-family: 'Orbitron', monospace; font-size: 0.6rem; padding: 7px 14px;
      border-radius: 6px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .btn-logout:hover { background: rgba(200,30,30,0.2); color: #ff6666; border-color: #ff4444; }

    .admin-body { padding: 24px; max-width: 1100px; margin: 0 auto; }

    .section-title {
      font-family: 'Orbitron', monospace; font-size: 0.85rem; color: var(--gold);
      letter-spacing: 0.1em; margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,170,0,0.15);
    }

    /* ── CARTES EN ATTENTE ── */
    #pending-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;
      margin-bottom: 50px;
    }
    .pending-card {
      background: var(--bg2); border: 1px solid rgba(255,170,0,0.2); border-radius: 12px;
      overflow: hidden; transition: border-color 0.2s;
    }
    .pending-card:hover { border-color: rgba(255,170,0,0.5); }
    .pending-card img { width: 100%; display: block; image-rendering: pixelated; }
    .pending-info { padding: 14px; }
    .pending-title { font-family: 'Orbitron', monospace; font-size: 0.75rem; color: var(--gold); margin-bottom: 4px; }
    .pending-author { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
    .pending-reason {
      font-size: 0.72rem; color: rgba(255,120,120,0.85);
      background: rgba(255,50,50,0.07); border: 1px solid rgba(255,50,50,0.2);
      border-radius: 5px; padding: 6px 10px; margin-bottom: 12px; line-height: 1.5;
    }
    .pending-reason strong { color: #ff8888; }
    .pending-date { font-size: 0.62rem; color: rgba(255,255,255,0.2); margin-bottom: 12px; }
    .pending-actions { display: flex; gap: 8px; }
    .btn-approve {
      flex: 1; padding: 9px; font-family: 'Orbitron', monospace; font-size: 0.65rem;
      background: rgba(0,180,80,0.15); color: #44dd88; border: 1px solid rgba(0,180,80,0.4);
      border-radius: 6px; cursor: pointer; transition: all 0.2s; font-weight: 700;
    }
    .btn-approve:hover { background: rgba(0,180,80,0.3); border-color: #44dd88; }
    .btn-reject {
      flex: 1; padding: 9px; font-family: 'Orbitron', monospace; font-size: 0.65rem;
      background: rgba(200,30,30,0.1); color: #ff6666; border: 1px solid rgba(200,30,30,0.3);
      border-radius: 6px; cursor: pointer; transition: all 0.2s;
    }
    .btn-reject:hover { background: rgba(200,30,30,0.25); border-color: #ff4444; }
    .pending-done { opacity: 0.4; pointer-events: none; }
    .pending-badge {
      display: inline-block; font-family: 'Orbitron', monospace; font-size: 0.6rem;
      padding: 3px 8px; border-radius: 4px; margin-bottom: 8px;
    }
    .badge-approved { background: rgba(0,180,80,0.15); color: #44dd88; border: 1px solid rgba(0,180,80,0.3); }
    .badge-rejected { background: rgba(200,30,30,0.15); color: #ff6666; border: 1px solid rgba(200,30,30,0.3); }

    .empty-state {
      text-align: center; padding: 60px 20px;
      font-family: 'Orbitron', monospace; font-size: 0.75rem;
      color: rgba(255,170,0,0.3); letter-spacing: 0.15em;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    .loading { text-align: center; padding: 40px; font-family: 'Orbitron', monospace; font-size: 0.7rem; color: rgba(255,170,0,0.4); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(10,22,40,0.95); border: 1px solid var(--gold);
      color: var(--gold); font-family: 'Orbitron', monospace; font-size: 0.68rem;
      padding: 12px 24px; border-radius: 8px; z-index: 999;
      transition: transform 0.3s; pointer-events: none; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">🔐 GOLD PIXEL ADMIN</div>
    <div class="login-sub">Accès réservé à l'administrateur</div>
    <input type="password" id="pwd-input" placeholder="Mot de passe admin"
           onkeydown="if(event.key==='Enter') login()">
    <button class="btn-login" onclick="login()">ACCÉDER AU TABLEAU DE BORD</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="admin-header">
    <div>
      <div class="admin-logo">✦ GOLD PIXEL <span>ADMIN</span></div>
    </div>
    <div class="stats-bar" id="stats-bar">
      <div class="stat-chip"><span class="val" id="stat-arts">—</span><span class="lbl">ŒUVRES</span></div>
      <div class="stat-chip alert"><span class="val" id="stat-pending">—</span><span class="lbl">EN ATTENTE</span></div>
      <div class="stat-chip"><span class="val" id="stat-votes">—</span><span class="lbl">VOTES TOTAL</span></div>
    </div>
    <button class="btn-logout" onclick="logout()">✕ DÉCONNEXION</button>
  </div>

  <div class="admin-body">
    <div class="section-title">📋 ŒUVRES EN ATTENTE DE VALIDATION</div>
    <div id="pending-grid"><div class="loading">CHARGEMENT...</div></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://gold-pixel.onrender.com';
let adminPwd = '';

// ── Login ──
async function login() {
  const pwd = document.getElementById('pwd-input').value.trim();
  if (!pwd) return;
  // Vérification : on appelle une route protégée pour valider le mot de passe
  try {
    const res = await fetch(`${API}/api/admin/stats`, {
      headers: { 'x-admin-password': pwd }
    });
    if (res.ok) {
      adminPwd = pwd;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display    = 'block';
      loadDashboard();
    } else {
      document.getElementById('login-error').textContent = '✗ MOT DE PASSE INCORRECT';
    }
  } catch (e) {
    document.getElementById('login-error').textContent = '✗ ERREUR DE CONNEXION';
  }
}

function logout() {
  adminPwd = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display    = 'none';
  document.getElementById('pwd-input').value = '';
}

// ── Chargement dashboard ──
async function loadDashboard() {
  await Promise.all([ loadStats(), loadPending() ]);
}

async function loadStats() {
  try {
    const res  = await fetch(`${API}/api/admin/stats`, { headers: { 'x-admin-password': adminPwd } });
    const data = await res.json();
    document.getElementById('stat-arts').textContent    = data.totalArts    ?? '—';
    document.getElementById('stat-pending').textContent = data.pendingCount ?? '—';
    document.getElementById('stat-votes').textContent   = data.totalVotes   ?? '—';
  } catch (_) {}
}

async function loadPending() {
  const grid = document.getElementById('pending-grid');
  grid.innerHTML = '<div class="loading">CHARGEMENT...</div>';
  try {
    const res  = await fetch(`${API}/api/admin/pending`, { headers: { 'x-admin-password': adminPwd } });
    const data = await res.json();

    if (!data.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✅</div>
          AUCUNE ŒUVRE EN ATTENTE<br>La file est vide !
        </div>`;
      return;
    }

    grid.innerHTML = data.map(doc => `
      <div class="pending-card" id="card-${doc.reviewId}">
        <img src="${doc.img}" alt="${esc(doc.title)}">
        <div class="pending-info">
          <div class="pending-title">${esc(doc.title)}</div>
          <div class="pending-author">par @${esc(doc.name)}</div>
          <div class="pending-date">${fmtDate(doc.createdAt)}</div>
          <div class="pending-reason"><strong>Raison IA :</strong> ${esc(doc.reason)}</div>
          <div class="pending-actions">
            <button class="btn-approve" onclick="approve('${doc.reviewId}', '${esc(doc.title)}')">✅ VALIDER</button>
            <button class="btn-reject"  onclick="rejectArt('${doc.reviewId}', '${esc(doc.title)}')">🚫 REJETER</button>
          </div>
        </div>
      </div>`).join('');
  } catch (e) {
    grid.innerHTML = '<div class="loading">ERREUR DE CHARGEMENT</div>';
  }
}

// ── Approuver ──
async function approve(reviewId, title) {
  const card = document.getElementById('card-' + reviewId);
  card.querySelector('.pending-actions').innerHTML = '<div style="font-family:Orbitron,monospace;font-size:0.65rem;color:rgba(255,255,255,0.4)">⏳ EN COURS...</div>';
  try {
    const res = await fetch(`${API}/api/admin/approve/${reviewId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPwd }
    });
    if (res.ok) {
      card.querySelector('.pending-info').insertAdjacentHTML('afterbegin', '<div class="pending-badge badge-approved">✅ APPROUVÉ — PUBLIÉ</div>');
      card.classList.add('pending-done');
      showToast(`✅ "${title}" publiée dans la galerie`);
      loadStats();
    } else {
      const j = await res.json();
      showToast('Erreur : ' + (j.error || res.status));
      loadPending();
    }
  } catch (e) { showToast('Erreur réseau'); loadPending(); }
}

// ── Rejeter ──
async function rejectArt(reviewId, title) {
  const reason = prompt(`Raison du rejet pour "${title}" (optionnel) :`) || 'Non conforme aux règles';
  const card   = document.getElementById('card-' + reviewId);
  card.querySelector('.pending-actions').innerHTML = '<div style="font-family:Orbitron,monospace;font-size:0.65rem;color:rgba(255,255,255,0.4)">⏳ EN COURS...</div>';
  try {
    const res = await fetch(`${API}/api/admin/reject/${reviewId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPwd },
      body:   JSON.stringify({ rejectReason: reason })
    });
    if (res.ok) {
      card.querySelector('.pending-info').insertAdjacentHTML('afterbegin', '<div class="pending-badge badge-rejected">🚫 REJETÉ</div>');
      card.classList.add('pending-done');
      showToast(`🚫 "${title}" rejetée définitivement`);
      loadStats();
    } else {
      showToast('Erreur rejet');
      loadPending();
    }
  } catch (e) { showToast('Erreur réseau'); loadPending(); }
}

// ── Utilitaires ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// Touche Entrée sur le champ mot de passe
document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
