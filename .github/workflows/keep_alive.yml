name: Keep Alive Gold Pixel

on:
  schedule:
    # S'exécute toutes les 10 minutes (Format Cron)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permet de le lancer manuellement pour tester

jobs:
  ping_server:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: |
          # Remplace l'URL ci-dessous par la vraie URL de ton site Render
          curl -I https://jeuxvideo.onrender.com
