# ═══════════════════════════════════════════════════════════════════
#  JEUXVIDEO.PI — Keep Alive + Crons
#
#  POURQUOI LE KEEP-ALIVE NE FONCTIONNAIT PAS :
#  Le fichier précédent contenait 2 noms "name:" au niveau racine
#  (le fichier était en réalité 2 fichiers YAML concaténés).
#  GitHub Actions ne lit que le premier "name:" / "jobs:" — le reste
#  était silencieusement ignoré. Le ping ne s'exécutait donc pas.
#
#  AUTRE CAUSE FRÉQUENTE (Render) :
#  Sur le Free Tier de Render, un service web se met en veille après
#  15 minutes SANS REQUÊTE HTTP ENTRANTE. Un ping GitHub toutes les
#  9 minutes suffit — MAIS GitHub peut retarder les crons de 5-30 min.
#  Solution : pinger toutes les 5 min pour absorber ce délai.
#
#  VARIABLES REQUISES (GitHub → Settings → Secrets → Actions) :
#    CRON_SECRET — même valeur que dans Render > Environment
# ═══════════════════════════════════════════════════════════════════

name: JeuxVideo.Pi — Keep Alive + Crons

on:
  schedule:
    # ── Keep Alive : toutes les 5 minutes ──
    # (9 min ne suffit pas si GitHub retarde le cron)
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'

    # ── Season Snapshot : fin de mois à 23h55 UTC ──
    - cron: '55 23 28-31 * *'

    # ── Monthly Reset : 1er du mois 00h05 UTC ──
    - cron: '5 0 1 * *'

  workflow_dispatch:  # Lancement manuel depuis GitHub UI

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1 : KEEP ALIVE
  # Ping simple toutes les 5 minutes — garde Render éveillé
  # ─────────────────────────────────────────────────────────────────
  keep_alive:
    name: 🏓 Keep Alive
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping /health
        run: |
          STATUS=$(curl --silent --max-time 20 --write-out "%{http_code}" \
            --output /dev/null \
            "https://jeuxvideo.onrender.com/health")
          echo "Status: $STATUS — $(date -u)"
          # On ne fail pas si le serveur était en veille (il se réveille)

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 : SEASON SNAPSHOT (fin de mois)
  # ─────────────────────────────────────────────────────────────────
  season_snapshot:
    name: 📸 Season Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Déclencher snapshot mensuel
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Snapshot à $(date -u)"
          RESPONSE=$(curl -X POST \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --silent --show-error --max-time 60 \
            "https://jeuxvideo.onrender.com/api/cron/season-snapshot")
          echo "Réponse: ${RESPONSE}"
          echo "$RESPONSE" | grep -q '"ok":true' && echo "✅ OK" || echo "⚠️ Vérifier les logs Render"

  # ─────────────────────────────────────────────────────────────────
  # JOB 3 : MONTHLY RESET (1er du mois)
  # ─────────────────────────────────────────────────────────────────
  monthly_reset:
    name: 🔄 Monthly Reset
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Déclencher reset mensuel
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Reset mensuel à $(date -u)"
          RESPONSE=$(curl -X POST \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --silent --show-error --max-time 120 \
            "https://jeuxvideo.onrender.com/api/cron/monthly-reset")
          echo "Réponse: ${RESPONSE}"
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Reset OK"
          elif echo "$RESPONSE" | grep -q 'NOT_FIRST_DAY'; then
            echo "ℹ️ Pas le 1er — ignoré"
          else
            echo "❌ Erreur reset"
            exit 1
          fi
