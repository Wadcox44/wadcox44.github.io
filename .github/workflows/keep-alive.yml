# ═══════════════════════════════════════════════════════════════════
#  JEUXVIDEO.PI — GitHub Actions Workflows
#  Fichier : .github/workflows/keep-alive.yml
#
#  Ce fichier contient TROIS jobs distincts :
#
#  1. keep_alive      — Ping toutes les 9 min pour garder Render actif
#  2. season_snapshot — Capture mensuelle à 23h59 le dernier jour du mois
#  3. monthly_reset   — Grand Nettoyage le 1er du mois à 00h00
#
#  VARIABLES REQUISES dans GitHub Secrets (Settings → Secrets → Actions) :
#    CRON_SECRET   — même valeur que dans Render env vars
#
#  Pour ajouter CRON_SECRET sur GitHub :
#    1. Aller sur le repo → Settings → Secrets and variables → Actions
#    2. New repository secret → Name: CRON_SECRET, Value: <votre_secret>
# ═══════════════════════════════════════════════════════════════════

name: JeuxVideo.Pi — Keep Alive & Crons Gold Pixel

on:
  schedule:
    # ── Job 1 : Keep Alive ──
    # Toutes les 9 minutes pour maintenir Render éveillé (free tier = sleep après 15min)
    # Format cron GitHub : minute heure jour-du-mois mois jour-de-la-semaine
    - cron: '0,9,18,27,36,45,54 * * * *'

    # ── Job 2 : Season Snapshot ──
    # Le 28, 29, 30 ET 31 de chaque mois à 23h59 UTC
    # (on déclenche les 4 derniers jours possibles car le serveur vérifie
    #  si c'est vraiment le dernier jour avec detectLastDayOfMonth())
    - cron: '59 23 28-31 * *'

    # ── Job 3 : Monthly Reset ──
    # Le 1er de chaque mois à 00h00 UTC
    - cron: '0 0 1 * *'

  # Permet de déclencher manuellement depuis GitHub UI (pour tests)
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1 : KEEP ALIVE
  # Ping simple pour empêcher Render de mettre le serveur en veille.
  # S'exécute toutes les 9 minutes.
  # ─────────────────────────────────────────────────────────────────
  keep_alive:
    name: 🏓 Keep Alive — Render Ping
    runs-on: ubuntu-latest

    # Ne pas exécuter ce job lors des déclenchements des crons mensuels
    # (les crons 28-31 et 1er ne doivent pas pinger, ils font autre chose)
    # On utilise une condition sur la minute du cron pour différencier.
    # En pratique, GitHub lance les jobs en parallèle — c'est OK.

    steps:
      - name: Ping /ping pour garder Render actif
        run: |
          # Appel HTTP simple vers la route /ping du serveur
          # --silent : pas d'affichage du corps de réponse
          # --max-time 30 : timeout 30 secondes
          curl --silent --max-time 30 "https://jeuxvideo.onrender.com/ping"
          echo "✅ Ping envoyé à $(date -u)"

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 : SEASON SNAPSHOT
  # Capture l'état du canevas (stats, classements, liste œuvres)
  # à 23h59 chaque dernier jour du mois.
  #
  # Le serveur vérifie lui-même si c'est bien le dernier jour du mois
  # (detectLastDayOfMonth()). Si ce n'est pas le bon jour, il ignore
  # silencieusement l'appel (retourne { ok: false, skipped: true }).
  # ─────────────────────────────────────────────────────────────────
  season_snapshot:
    name: 📸 Season Snapshot — Capture Mensuelle
    runs-on: ubuntu-latest

    steps:
      - name: Déclencher la capture mensuelle de fin de saison
        env:
          # Utilise le secret GitHub CRON_SECRET pour l'authentification
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "🕐 Déclenchement snapshot saisonnier à $(date -u)"

          # Appel POST vers la route de snapshot
          # -X POST  : méthode POST
          # -H       : header d'authentification cron
          # --silent : masquer la progression curl
          # --show-error : afficher les erreurs curl
          # --max-time 60 : timeout 60 secondes (le snapshot peut être long)
          RESPONSE=$(curl \
            -X POST \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --silent \
            --show-error \
            --max-time 60 \
            "https://jeuxvideo.onrender.com/api/cron/season-snapshot")

          echo "📊 Réponse serveur : ${RESPONSE}"

          # Vérifier que la réponse contient "ok" (succès)
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Snapshot saisonnier créé avec succès"
          else
            echo "⚠️  Le snapshot n'a peut-être pas été créé (vérifier les logs Render)"
            # Ne pas fail le job — un snapshot raté sera récupéré le lendemain
          fi

  # ─────────────────────────────────────────────────────────────────
  # JOB 3 : MONTHLY RESET (Grand Nettoyage)
  # Lance le reset mensuel le 1er du mois à 00h00 UTC.
  # Archive les œuvres, remet les compteurs à zéro.
  #
  # Ce job n'est pas conditionnel — le serveur vérifie lui-même
  # que c'est bien le 1er du mois (detectFirstDayOfMonth()).
  # ─────────────────────────────────────────────────────────────────
  monthly_reset:
    name: 🔄 Monthly Reset — Grand Nettoyage
    runs-on: ubuntu-latest

    steps:
      - name: Déclencher le Grand Nettoyage mensuel
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "🔄 Déclenchement reset mensuel à $(date -u)"

          # Appel POST vers la route de reset mensuel
          # --max-time 120 : timeout 2 minutes (le reset peut archiver beaucoup d'œuvres)
          RESPONSE=$(curl \
            -X POST \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --silent \
            --show-error \
            --max-time 120 \
            "https://jeuxvideo.onrender.com/api/cron/monthly-reset")

          echo "📊 Réponse serveur : ${RESPONSE}"

          # Vérifier le succès
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Reset mensuel effectué avec succès"
          elif echo "$RESPONSE" | grep -q 'NOT_FIRST_DAY'; then
            echo "ℹ️  Pas le 1er du mois — reset ignoré (normal si cron en avance)"
          else
            echo "❌ Erreur lors du reset mensuel"
            exit 1  # Fail le job pour être alerté par GitHub
          fi
